<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PyRunner — Python 运行平台</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#C96B3A" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#E07840" media="(prefers-color-scheme: dark)">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PyRunner">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js"></script>
<style>
  :root {
    /* Anthropic Design System — Warm Parchment Theme */
    --bg: #f5f4ed;
    --surface: #faf9f5;
    --surface2: #f0eee6;
    --surface3: #e8e6dc;
    --border: #f0eee6;
    --border-md: #e8e6dc;
    --text: #141413;
    --text2: #5e5d59;
    --text3: #87867f;
    --accent: #c96442;
    --accent-light: #fdf0ea;
    --accent-text: #7a3a1e;
    --green: #3a7a52;
    --green-bg: #eaf4ee;
    --red: #b53333;
    --red-bg: #fceaea;
    --blue: #3898ec;
    --blue-bg: #e8f2fd;
    --amber: #9a6c18;
    --amber-bg: #fdf4dc;
    --radius: 16px;
    --radius-sm: 8px;
    --radius-xs: 6px;
    --shadow-sm: 0px 0px 0px 1px #d1cfc5, 0 2px 8px rgba(20,20,19,0.04);
    --shadow: 0px 0px 0px 1px #d1cfc5, rgba(20,20,19,0.05) 0px 4px 24px;
    --mono: 'JetBrains Mono', 'Fira Code', monospace;
    --sans: 'DM Sans', system-ui, sans-serif;
    --serif: 'Lora', Georgia, serif;
    --header-h: 54px;
    --tabbar-h: 36px;
    --toolbar-h: 52px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141413;
      --surface: #1e1d1b;
      --surface2: #282724;
      --surface3: #30302e;
      --border: #30302e;
      --border-md: #3d3d3a;
      --text: #f5f4ed;
      --text2: #b0aea5;
      --text3: #5e5d59;
      --accent: #d97757;
      --accent-light: #2a1a0e;
      --accent-text: #f4a880;
      --green: #4aaf72;
      --green-bg: #0e2016;
      --red: #e05858;
      --red-bg: #280e0e;
      --blue: #6ba3e8;
      --blue-bg: #0a1c32;
      --amber: #e0a840;
      --amber-bg: #221608;
      --shadow-sm: 0px 0px 0px 1px rgba(255,255,255,0.07), 0 2px 8px rgba(0,0,0,0.3);
      --shadow: 0px 0px 0px 1px rgba(255,255,255,0.07), rgba(0,0,0,0.35) 0px 4px 24px;
    }
    header {
      background: rgba(30,29,27,0.9);
    }
    #toast {
      background: #30302e;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); font-family: var(--sans); color: var(--text); }
  /* Subtle warm grain texture over the parchment bg */
  body::after {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 9999;
    opacity: 0.018;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 128px 128px;
  }

  /* ── Layout ── */
  #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

  /* ── Header ── */
  header {
    display: flex; align-items: center;
    height: var(--header-h);
    padding: 0 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    gap: 10px;
    flex-shrink: 0;
    box-shadow: 0 1px 0 var(--border-md);
    position: relative; z-index: 10;
    -webkit-backdrop-filter: blur(12px);
    backdrop-filter: blur(12px);
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon {
    width: 30px; height: 30px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s;
    box-shadow: 0px 0px 0px 1px rgba(201,100,66,0.3), 0 2px 8px rgba(201,100,66,0.18);
  }
  .logo:hover .logo-icon {
    transform: rotate(-8deg) scale(1.08);
    box-shadow: 0px 0px 0px 1px rgba(201,100,66,0.4), 0 4px 14px rgba(201,100,66,0.28);
  }
  .logo-icon svg { width: 16px; height: 16px; fill: white; }
  .logo-name { font-size: 15px; font-weight: 500; letter-spacing: -0.3px; line-height: 1; font-family: var(--serif); }
  .logo-name span { color: var(--accent); }
  .logo-badge {
    font-size: 9px; font-weight: 600; letter-spacing: 0.5px;
    background: var(--accent-light); color: var(--accent-text);
    padding: 2px 7px; border-radius: 100px;
    text-transform: uppercase; font-family: var(--sans);
    border: 1px solid rgba(201,100,66,0.15);
  }
  .header-spacer { flex: 1; }
  .header-actions { display: flex; gap: 5px; }
  .icon-btn {
    width: 32px; height: 32px;
    border: 1px solid var(--border-md);
    border-radius: var(--radius-xs);
    background: transparent;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--text3);
    transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.12s cubic-bezier(0.34,1.56,0.64,1);
  }
  .icon-btn:hover { background: var(--surface2); color: var(--text2); border-color: var(--border-md); }
  .icon-btn:active { background: var(--surface3); transform: scale(0.88); }
  .icon-btn svg { width: 15px; height: 15px; }

  /* ── Tabs ── */
  #tab-bar {
    display: flex;
    height: var(--tabbar-h);
    background: var(--bg);
    border-bottom: 1px solid var(--border-md);
    padding: 0 12px;
    gap: 1px;
    overflow-x: auto;
    scrollbar-width: none;
    flex-shrink: 0;
    align-items: stretch;
  }
  #tab-bar::-webkit-scrollbar { display: none; }
  .tab {
    display: flex; align-items: center; gap: 5px;
    padding: 0 12px;
    font-size: 11.5px; font-weight: 500;
    color: var(--text3);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: color 0.18s, border-color 0.18s, background 0.18s;
    border-radius: var(--radius-xs) var(--radius-xs) 0 0;
    margin-top: 4px;
    font-family: var(--sans);
    letter-spacing: 0.1px;
  }
  .tab:hover { color: var(--text2); background: rgba(20,20,19,0.03); }
  @media (prefers-color-scheme: dark) { .tab:hover { background: rgba(245,244,237,0.04); } }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    background: var(--surface);
  }
  .tab:active { transform: scale(0.97); }
  .tab-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--text3); flex-shrink: 0;
    transition: background 0.12s;
  }
  .tab.active .tab-dot { background: var(--accent); }
  .tab-name { max-width: 90px; overflow: hidden; text-overflow: ellipsis; }
  .tab-close {
    width: 16px; height: 16px; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: var(--text3);
    margin-left: 1px; flex-shrink: 0;
    transition: background 0.12s, color 0.12s;
  }
  .tab-close:hover { background: var(--surface3); color: var(--text); }
  .tab-add {
    display: flex; align-items: center; padding: 0 8px;
    color: var(--text3); cursor: pointer; font-size: 16px; font-weight: 400;
    transition: color 0.15s, transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
  }
  .tab-add:hover { color: var(--accent); transform: scale(1.2) rotate(90deg); }

  /* ── Editor area ── */
  #main { flex: 1; display: flex; flex-direction: column; min-height: 0; }

  /* ── Toolbar ── */
  #toolbar {
    display: flex; align-items: center; gap: 5px;
    height: var(--toolbar-h);
    padding: 0 12px;
    background: var(--surface);
    border-top: 1px solid var(--border-md);
    flex-shrink: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  #toolbar::-webkit-scrollbar { display: none; }
  .run-btn {
    display: flex; align-items: center; gap: 7px;
    padding: 0 18px;
    height: 36px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    font-family: var(--sans);
    font-size: 13px; font-weight: 600;
    cursor: pointer;
    transition: filter 0.15s, transform 0.12s, background 0.25s, box-shadow 0.25s;
    letter-spacing: 0.2px;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
    box-shadow: 0px 0px 0px 1px rgba(201,100,66,0.4), 0 2px 6px rgba(201,100,66,0.2);
  }
  .run-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: rgba(255,255,255,0.1);
    opacity: 0;
    transition: opacity 0.15s;
  }
  .run-btn:hover::before { opacity: 1; }
  .run-btn:hover { filter: brightness(1.06); }
  .run-btn:active { transform: scale(0.96); }
  .run-btn.loading { opacity: 0.65; pointer-events: none; }
  .run-btn svg { width: 12px; height: 12px; fill: white; flex-shrink: 0; transition: transform 0.3s; }
  /* 运行中：按钮发出柔和的橙色光晕脉冲 */
  .run-btn.running {
    box-shadow: 0 0 0 0 rgba(176,40,40,0.4);
    animation: run-pulse 1.8s cubic-bezier(0.4,0,0.6,1) infinite;
  }
  @keyframes run-pulse {
    0%   { box-shadow: 0px 0px 0px 1px rgba(201,100,66,0.4), 0 0 0 0 rgba(201,100,66,0.35); }
    60%  { box-shadow: 0px 0px 0px 1px rgba(201,100,66,0.4), 0 0 0 10px rgba(201,100,66,0); }
    100% { box-shadow: 0px 0px 0px 1px rgba(201,100,66,0.4), 0 0 0 0 rgba(201,100,66,0); }
  }
  .toolbar-spacer { flex: 1; min-width: 4px; }
  .toolbar-divider { width: 1px; height: 20px; background: var(--border-md); flex-shrink: 0; margin: 0 3px; }
  .status-pill {
    display: flex; align-items: center; gap: 5px;
    font-size: 10px; font-weight: 600;
    padding: 4px 10px;
    border-radius: 100px;
    background: var(--surface2);
    color: var(--text3);
    border: 1px solid var(--border-md);
    transition: background 0.35s cubic-bezier(0.4,0,0.2,1),
                color 0.35s cubic-bezier(0.4,0,0.2,1),
                border-color 0.35s,
                transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    flex-shrink: 0;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    font-family: var(--sans);
  }
  .status-pill.ready { background: var(--green-bg); color: var(--green); border-color: rgba(58,122,82,0.2); }
  .status-pill.loading { background: var(--blue-bg); color: var(--blue); border-color: rgba(56,152,236,0.2); }
  .status-pill.error { background: var(--red-bg); color: var(--red); border-color: rgba(181,51,51,0.2); animation: pill-shake 0.4s cubic-bezier(0.36,0.07,0.19,0.97); }
  @keyframes pill-shake {
    0%,100% { transform: translateX(0); }
    20%     { transform: translateX(-3px); }
    40%     { transform: translateX(3px); }
    60%     { transform: translateX(-2px); }
    80%     { transform: translateX(2px); }
  }
  .status-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: currentColor; flex-shrink: 0;
    transition: background 0.3s;
  }
  .status-dot.pulse { animation: pulse 1.3s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.3;transform:scale(0.7)} }
  .toolbar-icon-btn {
    width: 32px; height: 32px;
    border-radius: var(--radius-xs);
    border: 1px solid var(--border-md);
    background: transparent;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--text3);
    transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.12s cubic-bezier(0.34,1.56,0.64,1);
    flex-shrink: 0;
  }
  .toolbar-icon-btn:hover { background: var(--surface2); color: var(--text2); border-color: var(--border-md); }
  .toolbar-icon-btn:active { background: var(--surface3); transform: scale(0.88); }
  .toolbar-icon-btn svg { width: 13px; height: 13px; }

  /* ── Split panel ── */
  #editor-panel { flex: 1; display: flex; flex-direction: column; min-height: 0; position: relative; }
  #resizer {
    height: 4px; background: var(--border-md); cursor: row-resize; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: height 0.2s cubic-bezier(0.4,0,0.2,1), background 0.15s;
    position: relative;
  }
  #resizer:hover, #resizer.dragging {
    height: 7px;
    background: var(--accent-light);
  }
  #resizer::after {
    content: '· · ·';
    font-size: 9px; letter-spacing: 4px;
    color: var(--text3);
    transition: color 0.15s, letter-spacing 0.2s;
    line-height: 1; user-select: none;
  }
  #resizer:hover::after, #resizer.dragging::after {
    color: var(--accent);
    letter-spacing: 6px;
  }

  /* ── Code editor ── */
  #code-wrap {
    flex: 1; min-height: 120px; overflow: hidden;
    display: flex; flex-direction: row; position: relative;
    background: var(--bg);
  }
  /* Focus indicator */
  #code-wrap::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 2px;
    background: var(--accent);
    z-index: 5;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }
  #code-wrap:focus-within::before {
    opacity: 1;
  }
  #line-numbers {
    flex-shrink: 0; width: 46px;
    padding: 16px 10px 16px 0;
    font-family: var(--mono); font-size: 13px; line-height: 1.8;
    text-align: right; color: var(--text3);
    background: var(--surface2);
    border-right: 1px solid var(--border-md);
    user-select: none; pointer-events: none;
    overflow: hidden; white-space: pre;
    will-change: scroll-position;
    opacity: 0.7;
  }
  #highlight-wrap {
    flex: 1; position: relative; overflow: hidden;
    display: flex;
  }
  #highlight-pre, #editor {
    position: absolute; inset: 0;
    margin: 0; padding: 16px 16px 60px 16px;
    font-family: var(--mono); font-size: 13px; line-height: 1.8;
    tab-size: 4; -moz-tab-size: 4;
    white-space: pre; overflow-wrap: normal;
    word-wrap: normal;
  }
  #highlight-pre {
    background: transparent; border: none;
    overflow: hidden; pointer-events: none;
    z-index: 1; color: transparent;
    will-change: scroll-position;
  }
  #highlight-code {
    font-family: inherit; font-size: inherit;
    line-height: inherit; display: block;
    background: none !important;
  }
  /* ── Word Wrap Mode ── */
  .wrap-mode #editor,
  .wrap-mode #highlight-pre,
  .wrap-mode #highlight-code {
    white-space: pre-wrap !important;
    word-break: break-all !important;
    overflow-wrap: anywhere !important;
  }

  #editor::-webkit-scrollbar { display: none; }
  #editor {
    background: transparent; border: none; outline: none;
    resize: none; z-index: 2;
    overflow: auto;
    -webkit-overflow-scrolling: touch;
    touch-action: pan-y pan-x;
    color: transparent;
    caret-color: var(--accent);
    -webkit-text-fill-color: transparent;
    scrollbar-width: none;
  }
  #editor::selection { background: rgba(201,100,66,0.15); -webkit-text-fill-color: transparent; }

  /* 语法配色 — Warm parchment palette */
  #highlight-code .token.comment, #highlight-code .token.prolog { color: #a09e96; font-style: italic; }
  #highlight-code .token.keyword { color: #b85228; font-weight: 500; }
  #highlight-code .token.builtin { color: #1a5ca8; }
  #highlight-code .token.string, #highlight-code .token.string-interpolation { color: #3a7a52; }
  #highlight-code .token.number { color: #2a5fa8; }
  #highlight-code .token.operator { color: #5e5d59; }
  #highlight-code .token.punctuation { color: #87867f; }
  #highlight-code .token.function { color: #7b3f00; }
  #highlight-code .token.class-name { color: #7b3f00; font-weight: 500; }
  #highlight-code .token.decorator { color: #9a6a10; }
  #highlight-code .token.boolean, #highlight-code .token.constant { color: #b85228; }
  #highlight-code .token.important { color: #b53333; }
  #highlight-code { color: #141413; }

  @media (prefers-color-scheme: dark) {
    #highlight-code .token.comment, #highlight-code .token.prolog { color: #5e5d59; font-style: italic; }
    #highlight-code .token.keyword { color: #d97757; font-weight: 500; }
    #highlight-code .token.builtin { color: #6ba3e8; }
    #highlight-code .token.string, #highlight-code .token.string-interpolation { color: #4aaf72; }
    #highlight-code .token.number { color: #6ba3e8; }
    #highlight-code .token.operator { color: #87867f; }
    #highlight-code .token.punctuation { color: #5e5d59; }
    #highlight-code .token.function { color: #e0a840; }
    #highlight-code .token.class-name { color: #e0a840; font-weight: 500; }
    #highlight-code .token.decorator { color: #e0a840; }
    #highlight-code .token.boolean, #highlight-code .token.constant { color: #d97757; }
    #highlight-code .token.important { color: #e05858; }
    #highlight-code { color: #f5f4ed; }
  }

  .editor-error-line {
    background: rgba(181, 51, 51, 0.12);
    border-radius: 3px;
    padding: 1px 2px;
  }

  /* ── Output panel ── */
  #output-panel {
    height: 240px; min-height: 80px; max-height: 72vh;
    display: flex; flex-direction: column;
    background: var(--surface);
    border-top: 1px solid var(--border-md);
  }
  #output-header {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
    min-height: 36px;
  }
  #output-title {
    font-size: 10px; font-weight: 700; color: var(--text3);
    text-transform: uppercase; letter-spacing: 1px;
    font-family: var(--sans);
  }
  .output-spacer { flex: 1; }
  .output-action-btn {
    display: flex; align-items: center; gap: 4px;
    font-size: 11px; font-weight: 500; color: var(--text3);
    cursor: pointer; padding: 4px 8px;
    border-radius: var(--radius-xs);
    transition: background 0.12s, color 0.12s;
    border: 1px solid transparent;
    font-family: var(--sans);
    letter-spacing: 0.1px;
  }
  .output-action-btn:hover { background: var(--surface3); color: var(--text2); border-color: var(--border-md); }
  .output-action-btn svg { width: 11px; height: 11px; }
  #output-scroll {
    flex: 1; overflow-y: auto; overflow-x: auto; padding: 14px 16px;
    scrollbar-width: thin; scrollbar-color: var(--border-md) transparent;
    -webkit-overflow-scrolling: touch;
    background: var(--surface);
  }
  #output-scroll::-webkit-scrollbar { width: 3px; }
  #output-scroll::-webkit-scrollbar-track { background: transparent; }
  #output-scroll::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 2px; }
  #output-content {
    font-family: var(--mono); font-size: 12.5px; line-height: 1.8;
    white-space: pre-wrap; word-break: break-all;
    color: var(--text);
  }
  .out-line { display: block; }
  .out-line.stderr { color: var(--red); animation: line-in-err 0.2s ease; }
  .out-line.success { color: var(--green); animation: line-in-ok 0.25s cubic-bezier(0.34,1.56,0.64,1); }
  .out-line.info { color: var(--text3); font-style: italic; }
  .out-line.image-out { margin: 10px 0; }
  .out-line.image-out img { max-width: 100%; border-radius: var(--radius-sm); border: 1px solid var(--border-md); display: block; animation: fade-in-up 0.35s cubic-bezier(0.4,0,0.2,1); }
  @keyframes line-in-err {
    from { opacity: 0; transform: translateX(-4px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes line-in-ok {
    from { opacity: 0; transform: scale(0.97); }
    to   { opacity: 1; transform: scale(1); }
  }

  /* ── Placeholder ── */
  .output-placeholder {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; gap: 12px;
    animation: fade-in-up 0.4s cubic-bezier(0.4,0,0.2,1);
  }
  @keyframes fade-in-up {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .output-placeholder-icon {
    width: 42px; height: 42px; border-radius: 12px;
    background: var(--surface2);
    border: 1px solid var(--border-md);

  }
  .output-placeholder-icon svg { width: 20px; height: 20px; color: var(--text3); opacity: 0.6; }
  .output-placeholder p { font-size: 12px; color: var(--text3); font-family: var(--sans); letter-spacing: 0.1px; }

  /* ── Bottom sheet drawer ── */
  .sheet-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0);
    display: flex; z-index: 100; align-items: flex-end;
    backdrop-filter: blur(0px);
    -webkit-backdrop-filter: blur(0px);
    pointer-events: none;
    transition: background 0.28s cubic-bezier(0.4,0,0.2,1),
                backdrop-filter 0.28s cubic-bezier(0.4,0,0.2,1);
  }
  .sheet-overlay.open {
    background: rgba(20,20,19,0.5);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    pointer-events: auto;
  }
  .sheet {
    width: 100%; background: var(--surface);
    border-radius: var(--radius) var(--radius) 0 0;
    display: flex; flex-direction: column;
    animation: none;
    transform: translateY(100%);
    transition: transform 0.32s cubic-bezier(0.32,0.72,0,1);
    padding-bottom: env(safe-area-inset-bottom);
    box-shadow: 0px 0px 0px 1px var(--border-md), 0 -8px 40px rgba(20,20,19,0.12);

    border-top: 1px solid var(--border-md);

  .sheet-overlay.open .sheet {
    transform: translateY(0);
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .sheet-handle { width: 32px; height: 3px; border-radius: 2px; background: var(--border-md); margin: 12px auto 4px; opacity: 0.6; }
  .sheet-header { display: flex; align-items: center; padding: 10px 16px 10px; gap: 10px; border-bottom: 1px solid var(--border); }
  .sheet-title { font-size: 16px; font-weight: 500; flex: 1; letter-spacing: -0.3px; font-family: var(--serif); }

  /* ── Snippets ── */
  #snippets-drawer { max-height: 85vh; }
  #snippets-list { overflow-y: auto; padding: 4px 10px 16px; flex: 1; }
  .snippet-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 8px 10px 10px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s, box-shadow 0.15s, padding-left 0.2s;
    border-left: 2px solid transparent;
  }
  .snippet-item:hover {
    background: var(--surface2);
    border-left-color: var(--accent);
    padding-left: 12px;
  }
  .snippet-item:active { background: var(--surface3); transform: scale(0.99); }
  .snippet-icon {
    width: 38px; height: 38px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 19px; flex-shrink: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
  }
  .snippet-text { flex: 1; min-width: 0; }
  .snippet-text .snippet-name { font-size: 13px; font-weight: 500; font-family: var(--serif); }
  .snippet-text .snippet-desc { font-size: 11.5px; color: var(--text3); margin-top: 2px; }
  .snippet-arrow { color: var(--text3); font-size: 16px; }
  .snippet-actions { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }
  .snippet-load-btn, .snippet-newtab-btn {
    font-size: 10.5px; font-weight: 600; padding: 3px 8px;
    border-radius: 6px; cursor: pointer; transition: background 0.12s, color 0.12s;
    text-align: center; white-space: nowrap;
  }
  .snippet-load-btn { background: var(--accent-light); color: var(--accent-text); }
  .snippet-load-btn:hover { background: var(--accent); color: white; }
  .snippet-newtab-btn { background: var(--surface3); color: var(--text2); }
  .snippet-newtab-btn:hover { background: var(--border-md); color: var(--text); }

  /* ── Settings ── */
  #settings-drawer { max-height: 85vh; }
  #settings-body { overflow-y: auto; padding: 4px 16px 24px; flex: 1; }
  .setting-section-title {
    font-size: 9px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.9px; color: var(--text3);
    padding: 18px 0 6px;
    display: flex; align-items: center; justify-content: space-between;
    font-family: var(--sans);
  }
  .setting-row {
    display: flex; align-items: center; padding: 11px 0;
    border-bottom: 1px solid var(--border); gap: 12px;
  }
  .setting-row:last-child { border-bottom: none; }
  .setting-label { flex: 1; }
  .setting-label p { font-size: 13.5px; font-weight: 400; font-family: var(--sans); }
  .setting-label span { font-size: 11.5px; color: var(--text3); margin-top: 1px; display: block; }
  select.setting-select {
    background: var(--surface2); border: 1px solid var(--border-md);
    color: var(--text); font-family: var(--sans); font-size: 12px;
    padding: 6px 10px; border-radius: var(--radius-sm); outline: none;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  select.setting-select:focus { border-color: var(--accent); }
  .toggle {
    width: 40px; height: 22px; border-radius: 100px;
    background: var(--surface3); border: 1px solid var(--border-md);
    position: relative; cursor: pointer;
    transition: background 0.25s cubic-bezier(0.4,0,0.2,1),
                border-color 0.25s;
    flex-shrink: 0;
  }
  .toggle.on { background: var(--accent); border-color: var(--accent); }
  .toggle::after {
    content: ''; position: absolute;
    width: 16px; height: 16px; border-radius: 50%;
    background: white; top: 2px; left: 2px;
    transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 1px 3px rgba(20,20,19,0.2);
  }
  .toggle.on::after { transform: translateX(18px); }

  /* ── Package Manager UI ── */
  .pkg-input-group {
    display: flex; gap: 8px; margin-top: 10px; width: 100%;
  }
  .pkg-input {
    flex: 1; background: var(--bg); border: 1px solid var(--border-md);
    padding: 8px 13px; border-radius: var(--radius-sm);
    color: var(--text); font-family: var(--mono); font-size: 12px; outline: none;
    transition: border-color 0.15s;
  }
  .pkg-input:focus { border-color: var(--accent); }
  .pkg-btn {
    padding: 0 16px; background: var(--accent); color: white;
    border: none; border-radius: var(--radius-sm); font-size: 12px;
    font-weight: 600; cursor: pointer; font-family: var(--sans);
    box-shadow: 0px 0px 0px 1px rgba(201,100,66,0.3);
    transition: filter 0.12s;
  }
  .pkg-btn:hover { filter: brightness(1.06); }
  .pkg-btn:active { transform: scale(0.97); }

  #installed-pkgs-list {
    display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px;
  }
  .pkg-tag {
    font-size: 10px; font-family: var(--mono); font-weight: 500;
    padding: 3px 9px; border-radius: 100px;
    background: var(--green-bg); color: var(--green);
    border: 1px solid rgba(58, 122, 82, 0.2);
  }
  .refresh-btn {
    font-size: 10px; color: var(--accent); cursor: pointer;
    text-transform: none; font-weight: 500; letter-spacing: 0;
    font-family: var(--sans);
  }
  .refresh-btn:active { opacity: 0.6; }

  /* ── Toast ── */
  #toast {
    position: fixed; top: calc(var(--header-h) + 12px); left: 50%;
    transform: translateX(-50%) translateY(-16px);
    background: var(--surface);
    color: var(--text);
    padding: 10px 18px 10px 14px;
    border-radius: var(--radius-sm);
    font-size: 12.5px; font-weight: 500;
    z-index: 400;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.25s;
    white-space: nowrap; opacity: 0;
    box-shadow: var(--shadow);
    pointer-events: none;
    border-left: 3px solid var(--accent);
    font-family: var(--sans);
  }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* ── Loading overlay ── */
  #loading-overlay {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 500;
    transition: opacity 0.5s cubic-bezier(0.4,0,0.2,1);
    gap: 0;
  }
  .loader-wordmark {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 40px;
    animation: loader-appear 0.6s cubic-bezier(0.4,0,0.2,1) both;
  }
  .loader-wordmark-icon {
    width: 34px; height: 34px; border-radius: 9px;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    box-shadow: 0px 0px 0px 1px rgba(201,100,66,0.3), 0 3px 10px rgba(201,100,66,0.2);
  }
  .loader-wordmark-icon svg { width: 18px; height: 18px; fill: white; }
  .loader-wordmark-text {
    font-size: 22px; font-weight: 500; letter-spacing: -0.4px;
    color: var(--text);
    font-family: var(--serif);
  }
  .loader-wordmark-text span { color: var(--accent); }
  @keyframes loader-appear {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  /* 细进度条：Anthropic 风格极简线条 */
  .loader-bar {
    width: 160px; height: 1px;
    background: var(--border-md);
    border-radius: 1px;
    margin-bottom: 18px;
    overflow: hidden;
    animation: loader-appear 0.6s 0.1s cubic-bezier(0.4,0,0.2,1) both;
  }
  .loader-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 1px;
    width: 0%;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }
  .loader-text {
    font-size: 11px; color: var(--text3);
    text-align: center; max-width: 200px; line-height: 1.7;
    min-height: 1.7em; letter-spacing: 0.2px;
    animation: loader-appear 0.6s 0.15s cubic-bezier(0.4,0,0.2,1) both;
    font-family: var(--sans);
  }

  /* ── 变量检查器面板 ── */
  #vars-panel {
    border-top: 1px solid var(--border-md);
    background: var(--bg);
    flex-shrink: 0;
    display: none;
  }
  #vars-panel.has-vars { display: block; }
  #vars-header {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 14px;
    border-bottom: 1px solid var(--border);
    cursor: pointer; user-select: none;
  }
  #vars-title {
    font-size: 9px; font-weight: 600; color: var(--text3);
    text-transform: uppercase; letter-spacing: 0.9px; flex: 1;
    font-family: var(--sans);
  }
  #vars-count {
    font-size: 10px; color: var(--accent); font-weight: 600;
    background: var(--accent-light); padding: 1px 7px;
    border-radius: 100px; display: none;
    border: 1px solid rgba(201,100,66,0.15);
  }
  #vars-count.visible { display: inline; }
  #vars-chevron {
    width: 14px; height: 14px; color: var(--text3);
    transition: transform 0.2s cubic-bezier(0.4,0,0.2,1);
  }
  #vars-panel.open #vars-chevron { transform: rotate(180deg); }
  #vars-scroll {
    overflow-y: auto; overflow-x: hidden;
    max-height: 0;
    padding: 0 12px;
    transition: max-height 0.28s cubic-bezier(0.4,0,0.2,1), padding 0.28s;
    scrollbar-width: thin; scrollbar-color: var(--border-md) transparent;
  }
  #vars-panel.open #vars-scroll {
    max-height: 174px;
    padding: 6px 12px 10px;
  }
  #vars-grid {
    display: flex; flex-direction: column; gap: 2px;
  }
  .var-row {
    display: flex; align-items: baseline; gap: 8px;
    padding: 4px 6px; border-radius: 6px;
    transition: background 0.1s;
    min-width: 0;
  }
  .var-row:hover { background: var(--surface2); }
  .var-name {
    font-family: var(--mono); font-size: 11.5px;
    font-weight: 500; color: var(--accent-text);
    flex-shrink: 0; max-width: 120px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .var-type {
    font-size: 9px; font-weight: 600; color: var(--text3);
    background: var(--surface3); padding: 1px 5px;
    border-radius: 4px; flex-shrink: 0;
    text-transform: lowercase; letter-spacing: 0.3px;
    font-family: var(--sans);
    border: 1px solid var(--border);
  }
  .var-value {
    font-family: var(--mono); font-size: 11px; color: var(--text2);
    flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    min-width: 0;
  }
  .var-empty {
    font-size: 11px; color: var(--text3); font-style: italic;
    padding: 8px 6px; font-family: var(--sans);
  }

  /* ── 格式化按钮 ── */
  .format-btn-wrap { position: relative; flex-shrink: 0; overflow: hidden; border-radius: var(--radius-xs); }
  #format-status {
    position: absolute; top: 2px; right: 2px;
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--green); display: none;
    pointer-events: none;
    border: 1.5px solid var(--surface);
  }
  #stdin-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 150;
    backdrop-filter: blur(0px);
    -webkit-backdrop-filter: blur(0px);
    pointer-events: none;
    transition: background 0.28s cubic-bezier(0.4,0,0.2,1),
                backdrop-filter 0.28s cubic-bezier(0.4,0,0.2,1);
  }
  #stdin-overlay.open {
    background: rgba(20,20,19,0.52);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    pointer-events: auto;
  }
  #stdin-box {
    background: var(--surface);
    border-radius: var(--radius) var(--radius) 0 0;
    border-top: 1px solid var(--border-md);
    padding: 22px 22px calc(22px + env(safe-area-inset-bottom));
    width: 100%; max-width: 480px;
    transform: translateY(100%);
    transition: transform 0.32s cubic-bezier(0.32,0.72,0,1);
    will-change: transform;
    box-shadow: 0 -8px 40px rgba(20,20,19,0.1);
  }
  #stdin-overlay.open #stdin-box {
    transform: translateY(0);
  }
  #stdin-label {
    font-size: 9px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.9px; color: var(--text3); margin-bottom: 10px;
    font-family: var(--sans);
  }
  #stdin-prompt {
    font-size: 13px; color: var(--text); margin-bottom: 14px;
    font-family: var(--mono); background: var(--bg);
    padding: 10px 14px; border-radius: var(--radius-xs);
    border-left: 2px solid var(--accent);
    min-height: 36px; word-break: break-all;
    border: 1px solid var(--border-md);
    border-left: 2px solid var(--accent);
  }
  #stdin-input {
    width: 100%; padding: 11px 14px;
    border: 1px solid var(--border-md); border-radius: var(--radius-sm);
    background: var(--bg); color: var(--text);
    font-family: var(--mono); font-size: 13px; outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  #stdin-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(201,100,66,0.1); }
  #stdin-submit {
    margin-top: 12px; width: 100%; padding: 13px;
    background: var(--accent); color: white; border: none;
    border-radius: var(--radius-sm); font-family: var(--sans);
    font-size: 13px; font-weight: 600; cursor: pointer;
    transition: filter 0.12s, transform 0.1s;
    box-shadow: 0px 0px 0px 1px rgba(201,100,66,0.4), 0 2px 6px rgba(201,100,66,0.2);
  }
  #stdin-submit:hover { filter: brightness(1.06); }
  #stdin-submit:active { filter: brightness(0.94); transform: scale(0.99); }
</style>

<script>

const _INITIAL_CODE = '# 欢迎使用 PyRunner 🐍\n# 这是一个支持完整 Python 3.12 的在线运行环境\n# 内置 NumPy, Pandas, Matplotlib 等常用科学计算库\n\nimport numpy as np\nimport matplotlib.pyplot as plt\n\nprint("正在生成漂亮的极坐标玫瑰图...")\n\n# 生成数据\ntheta = np.linspace(0, 8 * np.pi, 1000)\n# 玫瑰线方程 r = cos(k * theta)\nk = 5 / 4\nr = np.cos(k * theta)\n\n# 绘制图表\nfig = plt.figure(figsize=(6, 6))\nax = fig.add_subplot(111, projection=\'polar\')\n\n# 使用渐变颜色线段\nax.plot(theta, r, color=\'#E07840\', linewidth=2, alpha=0.8)\nax.fill(theta, r, color=\'#E07840\', alpha=0.2)\n\nax.set_title("Python 极坐标玫瑰线 (k=1.25)", fontsize=14, pad=20)\nax.grid(True, alpha=0.3)\nax.set_yticklabels([]) # 隐藏径向刻度\n\nplt.tight_layout()\nplt.show()\n\nprint("✨ 运行成功！尝试点击右上角「代码片段」探索更震撼的算法示例。")\n';

// ── Modern Modular Core（事件驱动 + 依赖注入）──
class EventBus {
  constructor() { this.listeners = new Map(); }
  on(event, handler) {
    if (!this.listeners.has(event)) this.listeners.set(event, new Set());
    this.listeners.get(event).add(handler);
    return () => this.off(event, handler);
  }
  off(event, handler) {
    const set = this.listeners.get(event);
    if (!set) return;
    set.delete(handler);
    if (set.size === 0) this.listeners.delete(event);
  }
  emit(event, payload) {
    const set = this.listeners.get(event);
    if (!set) return;
    set.forEach((handler) => {
      try { handler(payload); } catch (err) { console.warn(`[EventBus] ${event} failed:`, err); }
    });
  }
}

class StorageManager {
  constructor(eventBus, dom) {
    this.eventBus = eventBus;
    this.dom = dom;
    this.saveTimer = null;
  }
  loadTabs() {
    try {
      const saved = localStorage.getItem('pyrunner_tabs');
      if (!saved) return null;
      return { tabs: JSON.parse(saved), active: parseInt(localStorage.getItem('pyrunner_active') || '0', 10) };
    } catch (_) {
      return null;
    }
  }
  saveTabs(nextTabs, nextActiveTab) {
    try {
      const editorEl = this.dom.byId('editor');
      if (editorEl && nextTabs[nextActiveTab]) nextTabs[nextActiveTab].code = editorEl.value;
      localStorage.setItem('pyrunner_tabs', JSON.stringify(nextTabs));
      localStorage.setItem('pyrunner_active', String(nextActiveTab));
      this.eventBus.emit('storage:tabs:saved', { total: nextTabs.length, activeTab: nextActiveTab });
    } catch (_) {}
  }
  debounceSave(nextTabs, nextActiveTab, delay = 1500) {
    clearTimeout(this.saveTimer);
    this.saveTimer = setTimeout(() => this.saveTabs(nextTabs, nextActiveTab), delay);
  }
}

class SettingsManager {
  constructor(eventBus, defaults) {
    this.eventBus = eventBus;
    this.defaults = defaults;
  }
  load() {
    try {
      return Object.assign({}, this.defaults, JSON.parse(localStorage.getItem('pyrunner_settings') || '{}'));
    } catch (_) {
      return { ...this.defaults };
    }
  }
  save(nextSettings) {
    try {
      localStorage.setItem('pyrunner_settings', JSON.stringify(nextSettings));
      this.eventBus.emit('settings:changed', { ...nextSettings });
    } catch (_) {}
  }
}

class TabManager {
  constructor(eventBus, storageManager, initialCode) {
    this.eventBus = eventBus;
    this.storageManager = storageManager;
    const saved = this.storageManager.loadTabs();
    this.tabs = saved ? saved.tabs : [{ name: 'main.py', code: initialCode }];
    this.activeTab = saved ? Math.min(saved.active, this.tabs.length - 1) : 0;
  }
  getState() { return { tabs: this.tabs, activeTab: this.activeTab }; }
  sync(tabs, activeTab) { this.tabs = tabs; this.activeTab = activeTab; }
  saveNow(tabs, activeTab) { this.sync(tabs, activeTab); this.storageManager.saveTabs(this.tabs, this.activeTab); }
  saveDebounced(tabs, activeTab, delay = 1500) { this.sync(tabs, activeTab); this.storageManager.debounceSave(this.tabs, this.activeTab, delay); }
}

class EditorEngine {
  constructor(eventBus, tabManager) {
    this.eventBus = eventBus;
    this.tabManager = tabManager;
  }
  trackEdit(tabIndex, code) {
    const { tabs, activeTab } = this.tabManager.getState();
    if (tabs[tabIndex]) tabs[tabIndex].code = code;
    this.tabManager.saveDebounced(tabs, activeTab);
    this.eventBus.emit('editor:changed', { tabIndex, chars: code.length });
  }
}

class PyodideRunner {
  constructor(eventBus) {
    this.eventBus = eventBus;
    this.instance = null;
  }
  bind(instance) {
    this.instance = instance;
    this.eventBus.emit('pyodide:ready');
  }
}

const AppCore = {
  constants: {
    defaultSettings: {
      autoIndent: true,
      clearBeforeRun: true,
      showLines: true,
      fontSize: 13,
      wordWrap: false,
    },

  dom: { byId: (id) => document.getElementById(id) },
};
AppCore.eventBus = new EventBus();
AppCore.storageManager = new StorageManager(AppCore.eventBus, AppCore.dom);
AppCore.settingsManager = new SettingsManager(AppCore.eventBus, AppCore.constants.defaultSettings);
AppCore.tabManager = new TabManager(AppCore.eventBus, AppCore.storageManager, _INITIAL_CODE);
AppCore.editorEngine = new EditorEngine(AppCore.eventBus, AppCore.tabManager);
AppCore.pyodideRunner = new PyodideRunner(AppCore.eventBus);
AppCore.state = { pyodide: null, isRunning: false, inputResolve: null };

// 为现有代码保留兼容变量（重构期间的 API 兼容层）
let pyodide = AppCore.state.pyodide;
let activeTab = AppCore.tabManager.activeTab;
let isRunning = AppCore.state.isRunning;
let inputResolve = AppCore.state.inputResolve;
let settings = AppCore.settingsManager.load();

function saveSettings() {
  AppCore.settingsManager.save(settings);
}

function saveState() {
  AppCore.tabManager.saveNow(tabs, activeTab);
}

function loadState() {
  return AppCore.storageManager.loadTabs();
}

const _savedState = AppCore.tabManager.getState();
let tabs = _savedState.tabs;
activeTab = _savedState.activeTab;

function debounceSaveState() {
  AppCore.tabManager.saveDebounced(tabs, activeTab);
}

// 事件驱动协作：模块间不直接耦合
AppCore.eventBus.on('tab:added', () => debounceSaveState());
AppCore.eventBus.on('tab:removed', () => debounceSaveState());
AppCore.eventBus.on('settings:changed', () => showToast('设置已保存'));

// ── Pyodide init ──
async function initPyodide() {
  const _initCode = (tabs && tabs[activeTab]) ? tabs[activeTab].code : (_INITIAL_CODE || '');
  initEditor(_initCode);
  try {
    const setLoadMsg = (m, pct) => { 
      const el = document.getElementById('loader-text'); 
      if(el) el.textContent = m; 
      if(pct !== undefined) {
        const f = document.getElementById('loader-fill');
        if(f) f.style.width = pct + '%';
      } 
    };

    setLoadMsg('正在建立与 Python 的连接...', 5);
    let fakePct = 5;
    const fakeInterval = setInterval(() => {
      if (fakePct < 35) {
        fakePct += 1.5;
        setLoadMsg('正在下载核心编译环境...', fakePct);
      }
    }, 250);

    pyodide = await loadPyodide({ indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.26.1/full/' });
    AppCore.state.pyodide = pyodide;
    AppCore.pyodideRunner.bind(pyodide);
    clearInterval(fakeInterval);

    const pkgGroups =[
      { label: '加载数值计算库 (numpy, scipy)...', pkgs:['numpy', 'scipy', 'micropip'], pct: 45 },
      { label: '加载数据分析库 (pandas, statsmodels)...', pkgs:['pandas', 'statsmodels'], pct: 55 },
      { label: '加载可视化库 (matplotlib, Pillow)...', pkgs: ['matplotlib', 'Pillow'], pct: 65 },
      { label: '加载机器学习库 (sklearn, sympy)...', pkgs:['scikit-learn', 'sympy'], pct: 75 },
      { label: '加载网络架构库 (networkx)...', pkgs:['networkx', 'pyodide-http'], pct: 80 },
    ];
    for (const g of pkgGroups) {
      setLoadMsg(g.label, g.pct);
      await pyodide.loadPackage(g.pkgs);
    }

    setLoadMsg('安装高级扩展图表库 (seaborn, plotly)...', 85);
    try {
      // 适配 Python 3.12：安装 narwhals 兼容层并锁定稳定的 Plotly 5.24.1
            await pyodide.runPythonAsync("import micropip; await micropip.install(['narwhals', 'plotly==5.24.1', 'seaborn'])")
    } catch(_) {}

    setLoadMsg('正在加载中文字体，让图表更清晰...', 92);
    try {
      const fontUrl = 'https://cdn.jsdelivr.net/gh/googlefonts/noto-cjk@main/Sans/OTF/SimplifiedChinese/NotoSansCJKsc-Regular.otf';
      const fontResp = await fetch(fontUrl);
      if (!fontResp.ok) throw new Error('font fetch ' + fontResp.status);
      const fontBytes = new Uint8Array(await fontResp.arrayBuffer());
      pyodide.FS.writeFile('/tmp/NotoSansSC.otf', fontBytes);
      pyodide.runPython(`
import matplotlib.font_manager as fm, matplotlib as mpl
fe = fm.FontEntry(fname='/tmp/NotoSansSC.otf', name='Noto Sans SC')
fm.fontManager.ttflist.insert(0, fe)
mpl.rcParams['font.family'] = 'Noto Sans SC'
mpl.rcParams['axes.unicode_minus'] = False
`);
      showToast('Python 3.12 已就绪，中文字体已加载 ✓');
    } catch(fontErr) {
      console.warn('中文字体加载失败，降级:', fontErr);
      pyodide.runPython(`
import matplotlib as mpl
mpl.rcParams['axes.unicode_minus'] = False
`);
      showToast('Python 3.12 已就绪（中文字体加载失败）');
    }



        setLoadMsg('一切就绪，开始探索数学与代码的美妙吧！', 100);
    setStatus('ready', '就绪');
    document.getElementById('run-btn').classList.remove('loading');
    setTimeout(() => {
      document.getElementById('loading-overlay').style.opacity = '0';
      setTimeout(() => { document.getElementById('loading-overlay').style.display = 'none'; }, 400);
      refreshInstalledPkgs(); // 初始加载完成后获取列表
      initOutputScrollListener(); // 启动输出智能滚动监听
      ensureOutputInteractionDelegate();
    }, 300);
  } catch(e) {
    setStatus('error', '加载失败');
    appendOutput('⚠ Pyodide 加载失败，请检查网络连接\n' + e, 'stderr');
    document.getElementById('loading-overlay').style.display = 'none';
  }
}

// ── Run / Stop ──
let _stopRequested = false;
function toggleRun() {
  if (isRunning) {
    _stopRequested = true;
    // Pyodide 在主线程同步运行，点击停止只在当前代码执行完毕后才生效
    // 如果代码含有 await（如 input()），则能更快响应
    showToast('⏹ 停止请求已发出，将在当前操作完成后生效');
    const btn = document.getElementById('run-btn');
    btn.disabled = true;
    btn.style.opacity = '0.5';
  } else {
    runCode();
  }
}
function setRunBtn(running) {
  const btn = document.getElementById('run-btn');
  const icon = document.getElementById('run-icon');
  const label = document.getElementById('run-label');
  btn.disabled = false;
  btn.style.opacity = '';
  if (running) {
    btn.classList.remove('loading');
    btn.classList.add('running');
    icon.innerHTML = '<rect x="6" y="6" width="12" height="12" rx="2"/>';
    label.textContent = '停止';
    btn.style.background = 'var(--red)';
    btn.title = '停止运行（将在当前操作完成后生效）';
  } else {
    btn.classList.remove('running');
    icon.innerHTML = '<path d="M8 5v14l11-7z"/>';
    label.textContent = '运行';
    btn.style.background = '';
    btn.title = '运行 (Ctrl+Enter)';
  }
}

async function runCode() {
  if (!pyodide || isRunning) return;
  const code = document.getElementById('editor') ? document.getElementById('editor').value : '';
  if (!code.trim()) { showToast('请输入代码'); return; }
  isRunning = true;
  AppCore.state.isRunning = true;
  AppCore.eventBus.emit('runner:started', { activeTab });
  _stopRequested = false;
  _userScrolledUp = false; // 每次新运行重置，自动跟随到底部
  setRunBtn(true);
  setStatus('loading', '运行中');
  if (settings.clearBeforeRun) clearOutput({ resetHistory: false });

  // 运行期间锁定编辑器，防止用户误以为可以实时修改
  const _edLock = document.getElementById('editor');
  if (_edLock) { _edLock.readOnly = true; _edLock.style.opacity = '0.7'; }

  const t0 = performance.now();
  let outputEl = document.getElementById('output-content');

  if (!window._captureInstalled) {
    window._captureInstalled = true;
    pyodide.runPython(`
import sys, io
class _Capture(io.TextIOBase):
    def __init__(self, kind):
        self.kind = kind
    def write(self, s):
        import js
        js._pyrunner_write(self.kind, s)
        return len(s)
    def flush(self): pass
sys.stdout = _Capture('stdout')
sys.stderr = _Capture('stderr')
`);
    window._pyrunner_write = (kind, s) => appendOutput(s, kind === 'stderr' ? 'stderr' : null);
  }

  if (!window._inputInstalled) {
    window._inputInstalled = true;
    pyodide.runPython(`
import builtins
_orig_input = builtins.input
def _custom_input(prompt=""):
    import js
    return js._pyrunner_input(str(prompt))
builtins.input = _custom_input
`);
  }
  // stdin 处理：只初始化一次，放到 runCode 外更合理，但为兼容现有结构在此处用 flag 保护
  if (!window._stdinInstalled) {
    window._stdinInstalled = true;
    document.getElementById('stdin-submit').onclick = () => {
      const val = document.getElementById('stdin-input').value;
      document.getElementById('stdin-overlay').classList.remove('open');
      if (inputResolve) { inputResolve(val); inputResolve = null; AppCore.state.inputResolve = null; }
    };
    document.getElementById('stdin-input').onkeydown = (e) => {
      if (e.key === 'Enter') document.getElementById('stdin-submit').click();
    };

  window._pyrunner_input = (prompt) => {

  try {
    const importLines = code.match(/^\s*(?:import|from)\s+([a-zA-Z_][a-zA-Z0-9_]*)/gm) ||[];

      'timezone','zoneinfo','profile','pstats','timeit','cProfile',
      'trace','sys','atexit','faulthandler','site','sitecustomize',
      'numpy','pandas','matplotlib','scipy','sklearn','scikit_learn',
      'sympy','PIL','Pillow','statsmodels','micropip',
      'js','pyodide','_pyodide','pyodide_http',
      'cv2','skimage','plotly','bokeh','altair','seaborn','networkx','xgboost','lightgbm','requests','pyodide_http','pyodide-http','plotly.graph_objects','plotly.express','go','px',

            await pyodide.runPythonAsync(
              `import micropip as _mp, sys as _sys\n` +

    const hasPlt = code.includes('matplotlib') || code.includes('plt.');
    if (hasPlt) {

    const _edSync = document.getElementById('editor'); if(_edSync) tabs[activeTab].code = _edSync.value;
    

    const _userResult = await pyodide.runPythonAsync(code);

    pyodide.runPython([
      "import sys as _sys, io as _io, base64 as _b64",
      "",
      "_PNG_SIG = bytes([137,80,78,71,13,10,26,10])",
      "_JPG_SIG = bytes([255,216,255])",
      "_GIF_SIG = bytes([71,73,70,56])",
      "_BMP_SIG = bytes([66,77])",
      "_WEBP_SIG = bytes([82,73,70,70])",
      "",
      "def _to_png_b64(img_obj):",
      "    _b = _io.BytesIO()",
      "    img_obj.save(_b, format='PNG')",
      "    _b.seek(0)",

      "                    from PIL import Image as _PILMod",
      "                    if v.dtype != _np.uint8:",
      "                        _mn,_mx = v.min(), v.max()",

      "        try:",

    const elapsed = ((performance.now() - t0) / 1000).toFixed(3);

    refreshVarsPanel();
  } catch(e) {
    if (_stopRequested) {

      document.getElementById('stdin-overlay').classList.remove('open');

      appendOutput('\n⏹ 已手动停止执行', 'info');
      setStatus('ready', '就绪');
      AppCore.eventBus.emit('runner:stopped');
    } else {
      const raw = e.message || String(e);
      const lines = raw.split('\n');
      const execIdx = lines.findIndex(l => l.includes('<exec>'));
      const relevant = execIdx >= 0 ? lines.slice(execIdx) : lines.slice(-8);
      appendOutput('\n' + relevant.join('\n'), 'stderr');
      // 取 <exec> 之后最靠近错误点的行号，而非第一个（可能是解释器内部行）
      const relevantText = relevant.join('\n');
      const lineMatches = [...relevantText.matchAll(/line (\d+)/g)];
      const lineNo = lineMatches.length > 0 ? parseInt(lineMatches[lineMatches.length - 1][1]) : 0;
      if (lineNo > 0) highlightErrorLine(lineNo);
      setStatus('error', '出错');
      AppCore.eventBus.emit('runner:failed', { message: raw });

  isRunning = false;

// ── Output helpers ──
let _outputRaf = null;
let _outputLineCount = 0; // 计数器替代 querySelectorAll，避免密集输出时频繁 DOM 查询
let _userScrolledUp = false; // 用户主动上滚时暂停自动跟随

function openImagePreview(src) {
  const ov = document.createElement('div');
  ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;';
  const bi = document.createElement('img');
  bi.src = src;
  bi.style.cssText = 'max-width:100%;max-height:90dvh;border-radius:10px;';
  const tip = document.createElement('div');
  tip.textContent = '点击任意处或按 Esc 关闭';
  tip.style.cssText = 'position:absolute;bottom:24px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.5);font-size:12px;white-space:nowrap;';
  ov.append(bi, tip);
  const closeOv = () => {
    ov.remove();
    document.removeEventListener('keydown', escHandler);
  };
  const escHandler = (ev) => { if (ev.key === 'Escape') closeOv(); };
  ov.onclick = closeOv;
  document.addEventListener('keydown', escHandler);
  document.body.appendChild(ov);
}

function ensureOutputInteractionDelegate() {
  const root = document.getElementById('output-content');
  if (!root || root._interactionBound) return;
  root._interactionBound = true;
  root.addEventListener('click', (e) => {
    const img = e.target.closest('img[data-previewable="1"]');
    if (!img || !root.contains(img)) return;
    openImagePreview(img.src);
  });
}

// 监听用户在输出区域的滚动行为
function initOutputScrollListener() {
  const s = document.getElementById('output-scroll');
  if (!s) return;
  s.addEventListener('scroll', () => {
    const atBottom = s.scrollHeight - s.scrollTop - s.clientHeight < 32;
    _userScrolledUp = !atBottom;
  }, { passive: true });
}

function appendOutput(text, cls) {
  const el = document.getElementById('output-content');
  const ph = el.querySelector('.output-placeholder');
  if (ph) ph.remove();
  const parts = text.split('\n');
  parts.forEach((part, i) => {
    const isLast = i === parts.length - 1;
    if (isLast && part === '') return;
    const prev = el.lastChild;
    if (i === 0 && prev && prev._lineOpen && prev._cls === (cls||'')) {
      prev.textContent += part;
      if (!isLast) { prev.textContent += '\n'; prev._lineOpen = false; }
    } else {
      const span = document.createElement('span');
      span.className = 'out-line' + (cls ? ' ' + cls : '');
      span.textContent = part + (!isLast ? '\n' : '');
      span._cls = cls || '';
      span._lineOpen = isLast;
      el.appendChild(span);
      _outputLineCount++;
    }
  });
  scrollOutput();
  trimOutputIfNeeded();
}

function clearOutput(options = {}) {
  const { resetHistory = true, resetVars = true } = options;
  document.getElementById('output-content').innerHTML = '';
  _outputLineCount = 0;
  _userScrolledUp = false;
  document.getElementById('vars-grid').innerHTML = '<div class="var-empty">运行后变量将显示在这里</div>';
  document.getElementById('vars-count').classList.remove('visible');
  document.getElementById('vars-panel').classList.remove('has-vars', 'open');
  _varsPanelOpen = false;
  const lc = document.getElementById('output-linecount'); if(lc) lc.textContent='';
}

const MAX_OUTPUT_LINES = 2000;
function trimOutputIfNeeded() {
  if (_outputLineCount <= MAX_OUTPUT_LINES) return;
  const el = document.getElementById('output-content');
  const spans = el.querySelectorAll('.out-line');
  const toRemove = spans.length - MAX_OUTPUT_LINES;
  if (toRemove <= 0) return;
  const notice = document.createElement('span');
  notice.className = 'out-line info';
  notice.textContent = `… 输出过多，已截断至最新 ${MAX_OUTPUT_LINES} 行 …\n`;
  for (let i = 0; i < toRemove; i++) spans[i].remove();
  el.insertBefore(notice, el.firstChild);
  _outputLineCount = MAX_OUTPUT_LINES;
}

function scrollOutput() {
  const s = document.getElementById('output-scroll');
  if (_outputRaf) return;
  _outputRaf = requestAnimationFrame(() => {
    _outputRaf = null;
    if (!_userScrolledUp) {
      s.scrollTop = s.scrollHeight;
    }
    const lc = document.getElementById('output-linecount');
    if (lc) lc.textContent = _outputLineCount > 0 ? _outputLineCount + ' 行' : '';
  });
}

function setStatus(kind, text) {
  const pill = document.getElementById('status');
  const dot = pill.querySelector('.status-dot');
  const txt = document.getElementById('status-text');
  pill.className = 'status-pill ' + kind;
  txt.textContent = text;
  dot.className = 'status-dot' + (kind === 'loading' ? ' pulse' : '');
}

let _highlightRaf = null;
function highlightCode() {
  if (_highlightRaf) return;
  _highlightRaf = requestAnimationFrame(() => {
    _highlightRaf = null;
    const ed = document.getElementById('editor');
    const code = document.getElementById('highlight-code');
    if (!ed || !code) return;
    
    const raw = ed.value;
    let html = '';
    if (typeof Prism !== 'undefined') {
      html = Prism.highlight(raw, Prism.languages.python, 'python');
    } else {
      html = raw.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    
    if (raw.endsWith('\n')) html += '&#8203;';
    code.innerHTML = html;
    // 高亮后同步位置，行号更新（内容变化时才到这里，不在 scroll 路径上）
    syncScroll();
    updateLineNumbers();
  });
}

function updateLineNumbers() {
  const ed = document.getElementById('editor');
  const ln = document.getElementById('line-numbers');
  if (!ed || !ln) return;
  const lineCount = (ed.value.match(/\n/g) ||[]).length + 1;
  if (ln._lastCount === lineCount) return;
  ln._lastCount = lineCount;
  let s = '';
  for (let i = 1; i <= lineCount; i++) s += i + '\n';
  ln.textContent = s;
  // scrollTop 由 syncScroll 统一管理，这里不重复设置
}

// ── 滚动同步：移除延迟，实现真正的零延迟像素级同步 ──
function syncScroll() {
  const ed  = document.getElementById('editor');
  const pre = document.getElementById('highlight-pre');
  const ln  = document.getElementById('line-numbers');
  if (!ed || !pre) return;
  pre.scrollTop  = ed.scrollTop;
  pre.scrollLeft = ed.scrollLeft;

let _errLineNo = 0;
function highlightErrorLine(lineNo) {
  clearErrorHighlight();
  _errLineNo = lineNo;
  _renderErrorHighlight();
}
function _renderErrorHighlight() {
  if (!_errLineNo) return;
  const ed = document.getElementById('editor');
  const code = document.getElementById('highlight-code');
  if (!ed || !code || typeof Prism === 'undefined') return;
  const raw = ed.value;
  const lines = Prism.highlight(raw, Prism.languages.python, 'python').split('\n');
  if (_errLineNo >= 1 && _errLineNo <= lines.length) {
    lines[_errLineNo - 1] = '<span class="editor-error-line">' + (lines[_errLineNo - 1] || '\u00a0') + '</span>';
  }
  let finalHtml = lines.join('\n');
  if (raw.endsWith('\n')) finalHtml += '&#8203;';
  code.innerHTML = finalHtml;
  
  const lineH = parseFloat(getComputedStyle(ed).lineHeight) || 22;
  ed.scrollTop = Math.max(0, (_errLineNo - 4) * lineH);
  syncScroll();
}
function clearErrorHighlight() {
  _errLineNo = 0;
  highlightCode(); 
}

function insertText(text) {
  const ed = document.getElementById('editor');
  if (!ed) return;
  const s = ed.selectionStart, e = ed.selectionEnd;
  ed.value = ed.value.substring(0, s) + text + ed.value.substring(e);
  const pairMap = { '()':1, '[]':1, '{}':1, '""':1, "''":1 };
  const cur = pairMap[text] ? s + 1 : s + text.length;
  ed.setSelectionRange(cur, cur);
  ed.focus();
  highlightCode();
  AppCore.editorEngine.trackEdit(activeTab, ed.value);
}

function undoCode() {
  const ed = document.getElementById('editor');
  if (!ed) return;
  ed.focus();
  document.execCommand('undo');
  highlightCode();
}

function initEditor(code) {
  const ed = document.getElementById('editor');
  if (!ed) return;
  ed.value = code || _INITIAL_CODE;

  ed.addEventListener('input', () => {
    AppCore.editorEngine.trackEdit(activeTab, ed.value);
    highlightCode();
  });

  ed.addEventListener('scroll', syncScroll, { passive: true });

  ed.addEventListener('keydown', (e) => {
    const s = e.target.selectionStart, end = e.target.selectionEnd;

    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
      e.preventDefault(); toggleRun(); return;
    }

    if (e.key === 'Tab') {
      e.preventDefault();
      if (e.shiftKey) {
        const aLines = ed.value.split('\n');
        let pos=0, sl=0, el2=0;
        for(let i=0;i<aLines.length;i++){if(pos<=s)sl=i;if(pos<=end)el2=i;pos+=aLines[i].length+1;}
        let remS=0,remTotal=0;
        for(let i=sl;i<=el2;i++){const o=aLines[i];aLines[i]=o.replace(/^ {1,4}/,'');const d=o.length-aLines[i].length;if(i===sl)remS=d;remTotal+=d;}
        ed.value=aLines.join('\n');
        ed.setSelectionRange(Math.max(0,s-remS),Math.max(0,end-remTotal));
      } else {
        ed.value = ed.value.substring(0,s)+'    '+ed.value.substring(end);
        ed.setSelectionRange(s+4, s+4);
      }
      AppCore.editorEngine.trackEdit(activeTab, ed.value);
      highlightCode(); return;
    }

    const pairs = {'(':')', '[':']', '{':'}', '"':'"', "'":"'"};
    if (pairs[e.key] && s === end) {
      e.preventDefault();
      ed.value = ed.value.substring(0,s) + e.key + pairs[e.key] + ed.value.substring(end);
      ed.setSelectionRange(s+1, s+1);
      AppCore.editorEngine.trackEdit(activeTab, ed.value);
      highlightCode(); return;
    }
    if ([")", "]", "}"].includes(e.key) && ed.value[s] === e.key) {
      e.preventDefault(); ed.setSelectionRange(s+1, s+1); return;
    }
    if (e.key === 'Backspace' && s === end && s > 0) {
      const open = ed.value[s-1], close = ed.value[s];
      if (pairs[open] === close) {
        e.preventDefault();
        ed.value = ed.value.substring(0,s-1) + ed.value.substring(s+1);
        ed.setSelectionRange(s-1, s-1);
        AppCore.editorEngine.trackEdit(activeTab, ed.value);
        highlightCode(); return;
      }
    }
    if (e.key === 'Enter' && settings.autoIndent) {
      const lines = ed.value.substring(0,s).split('\n');
      const last = lines[lines.length-1];
      const indent = last.match(/^(\s*)/)[1];
      const extra = last.trimEnd().endsWith(':') ? '    ' : '';
      e.preventDefault();
      ed.value = ed.value.substring(0,s) + '\n' + indent + extra + ed.value.substring(end);
      const newPos = s + 1 + indent.length + extra.length;
      ed.setSelectionRange(newPos, newPos);
      AppCore.editorEngine.trackEdit(activeTab, ed.value);
      highlightCode(); return;
    }
  });
  highlightCode();
}

// ── Tabs ──
function startRenameTab(idx, div) {
  const nameEl = div.querySelector('.tab-name'); if (!nameEl) return;
  const old = tabs[idx].name;
  const inp = document.createElement('input');
  inp.value = old;
  inp.style.cssText = 'width:80px;font-size:12px;font-family:var(--sans);font-weight:500;background:var(--surface3);border:1px solid var(--accent);border-radius:4px;padding:0 4px;color:var(--text);outline:none;';
  nameEl.replaceWith(inp); inp.focus(); inp.select();
  const commit = () => { const v = inp.value.trim()||old; tabs[idx].name = v.endsWith('.py')?v:v+'.py'; renderTabs(); debounceSaveState(); };
  inp.onblur = commit;
  inp.onkeydown = (e) => { if(e.key==='Enter'){e.preventDefault();inp.blur();} if(e.key==='Escape'){inp.value=old;inp.blur();} };
}
function addTab(name, code) {
  // 新建文件名：扫描现有 tab 中 scriptN 的最大值，取 N+1，避免删掉又建出现跳号
  const nextNum = () => {
    const nums = tabs.map(t => { const m = t.name.match(/^script(\d+)\.py$/); return m ? parseInt(m[1]) : 0; });
    return (nums.length ? Math.max(...nums) : 0) + 1;
  };
  tabs.push({ 
    name: name || 'script' + nextNum() + '.py', 
    code: code || '# 新文件\nprint("Hello, World!")\n' 
  });
  AppCore.eventBus.emit('tab:added', { total: tabs.length, name: tabs[tabs.length - 1].name });
  switchTab(tabs.length - 1);
  renderTabs();
}

function switchTab(idx) {
  const _edT = document.getElementById('editor');
  if(_edT) tabs[activeTab].code = _edT.value;
  activeTab = idx;
  AppCore.tabManager.sync(tabs, activeTab);
  AppCore.eventBus.emit('tab:switched', { activeTab });
  clearErrorHighlight(); // 切换 Tab 时清除旧 Tab 残留的错误高亮
  if(_edT){ _edT.value = tabs[idx].code || ''; highlightCode(); }
  renderTabs();
}

function removeTab(e, idx) {
  e.stopPropagation();
  if (tabs.length === 1) { showToast('至少保留一个标签页'); return; }
  tabs.splice(idx, 1);
  activeTab = Math.min(activeTab, tabs.length - 1);
  AppCore.tabManager.sync(tabs, activeTab);
  AppCore.eventBus.emit('tab:removed', { total: tabs.length, activeTab });
  const _edR = document.getElementById('editor'); if(_edR){ _edR.value = tabs[activeTab].code || ''; highlightCode(); }
  renderTabs();
}

function renderTabs() {
  const bar = document.getElementById('tab-bar');
  bar.innerHTML = '';
  tabs.forEach((t, i) => {
    const div = document.createElement('div');
    div.className = 'tab' + (i === activeTab ? ' active' : '');
    div.innerHTML = `<span style="width:6px;height:6px;border-radius:50%;background:${i===activeTab?'var(--accent)':'var(--text3)'};display:inline-block;flex-shrink:0;margin-right:2px;"></span><span class="tab-name">${t.name}</span><span class="tab-close" onclick="removeTab(event,${i})">×</span>`;
    div.addEventListener('click', () => switchTab(i));
    div.addEventListener('dblclick', (ev) => { ev.stopPropagation(); startRenameTab(i, div); });
    bar.appendChild(div);
  });
  const add = document.createElement('div');
  add.className = 'tab-add';
  add.textContent = '+';
  add.onclick = () => addTab();
  bar.appendChild(add);
}

});
window.addEventListener('pointermove', (e) => {

  outputPanel.style.height = newH + 'px';

});

function renderSnippets() {
  const list = document.getElementById('snippets-list');
  list.innerHTML = '';
  SNIPPETS.forEach(s => {
    const div = document.createElement('div');
    div.className = 'snippet-item';
    div.innerHTML = `<div class="snippet-icon">${s.icon}</div><div class="snippet-text"><div class="snippet-name">${s.name}</div><div class="snippet-desc">${s.desc}</div></div><div class="snippet-actions"><span class="snippet-load-btn" title="覆盖当前 Tab">加载</span><span class="snippet-newtab-btn" title="新建 Tab 打开">新建</span></div>`;

    div.querySelector('.snippet-load-btn').onclick = (e) => {
      e.stopPropagation();
      const currentCode = (document.getElementById('editor') || {}).value || '';
      if (currentCode.trim() && currentCode !== s.code) {
        // 当前 Tab 有内容，二次确认
        if (!div._confirmPending) {
          div._confirmPending = true;
          div.querySelector('.snippet-load-btn').textContent = '确认覆盖';
          div.querySelector('.snippet-load-btn').style.color = 'var(--red)';
          div._confirmTimer = setTimeout(() => {
            div._confirmPending = false;
            div.querySelector('.snippet-load-btn').textContent = '加载';
            div.querySelector('.snippet-load-btn').style.color = '';
          }, 2500);
          showToast('再次点击「确认覆盖」当前代码');
          return;
        }
        clearTimeout(div._confirmTimer);
        div._confirmPending = false;
      }
      tabs[activeTab].code = s.code;
      const _edS = document.getElementById('editor'); if(_edS){ _edS.value = s.code; highlightCode(); }
      closeSnippets();
      showToast('已加载: ' + s.name);
    };

    div.querySelector('.snippet-newtab-btn').onclick = (e) => {
      e.stopPropagation();
      addTab(s.name.replace(/[^\w\u4e00-\u9fa5]/g, '_') + '.py', s.code);
      closeSnippets();
      showToast('已在新标签页打开: ' + s.name);
    };

    // 点击整行默认走"加载"逻辑（触发 load btn click）
    div.addEventListener('click', (e) => {
      if (!e.target.classList.contains('snippet-load-btn') && !e.target.classList.contains('snippet-newtab-btn')) {
        div.querySelector('.snippet-load-btn').click();
      }
    });

    list.appendChild(div);
  });
}

// ── 包管理器 ──
async function refreshInstalledPkgs() {
  const listEl = document.getElementById('installed-pkgs-list');
  if (!pyodide) return;

  try {
    // 获取 Python 环境中可识别的安装包（优先 importlib.metadata，兼容 micropip）
    const pkgsJson = await pyodide.runPythonAsync(`
import json, sys

installed = set()

try:
    import importlib.metadata as _md
    for dist in _md.distributions():
        try:
            name = (dist.metadata.get('Name') or '').strip() or (dist.name or '').strip()
            if name:
                installed.add(name)
        except Exception:
            pass
except Exception:
    pass

try:
    import micropip
    for item in micropip.list():
        name = getattr(item, 'name', None)
        if name:
            installed.add(str(name))
except Exception:
    pass

for m in list(sys.modules.keys()):
    if m and not m.startswith('_') and '.' not in m:
        installed.add(m)

filtered = sorted(
    p for p in installed
    if p and not p.startswith('_') and '.' not in p and len(p) > 1
)
json.dumps(filtered)
    `);

    const pkgArray = JSON.parse(pkgsJson || '[]');
    listEl.innerHTML = pkgArray.map(p => `<span class="pkg-tag">${p}</span>`).join('');
    if (pkgArray.length === 0) listEl.innerHTML = '<span style="font-size:10px;color:var(--text3)">暂无已安装的第三方库</span>';
  } catch (err) {
    listEl.innerHTML = '<span style="font-size:10px;color:var(--red)">获取列表失败</span>';
  }
}

async function installPackageManual() {
  const input = document.getElementById('pkg-input');
  const btn = document.getElementById('pkg-install-btn');
  const pkgName = input.value.trim();
  
  if (!pkgName) { showToast('请输入包名'); return; }
  if (!pyodide) { showToast('Python 尚未就绪'); return; }

  input.disabled = true;
  btn.textContent = '安装中...';
  btn.style.opacity = '0.6';

  appendOutput(`\n📦 正在手动安装包: ${pkgName}...\n`, 'info');

  try {
    try {
      await pyodide.loadPackage(pkgName);
      appendOutput(`✓ ${pkgName} 已通过官方库成功安装\n`, 'success');
    } catch (_) {
      // 使用 globals.set 传参，避免字符串拼接注入风险
      pyodide.globals.set('_manual_pkg', pkgName);
      await pyodide.runPythonAsync(`import micropip; await micropip.install(_manual_pkg)`);
      pyodide.globals.delete('_manual_pkg');
      appendOutput(`✓ ${pkgName} 已从 PyPI 成功安装\n`, 'success');
    }
    showToast(`✓ 安装成功: ${pkgName}`);
    input.value = '';
    refreshInstalledPkgs(); // 安装成功后刷新列表
  } catch (err) {
    appendOutput(`✗ 安装失败: ${err.message}\n`, 'stderr');
    showToast('安装失败，请检查包名或网络');
  } finally {
    input.disabled = false;
    btn.textContent = '安装';
    btn.style.opacity = '1';
  }
}

function importFile(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(ev) {
    const code = ev.target.result;
    const name = file.name || 'imported.py';
    addTab(name, code);
    showToast(`✓ 已导入文件: ${name}`);
    e.target.value = '';
  };
  reader.readAsText(file);
}

let _autopep8Ready = false;
let _autopep8Loading = false;

async function formatCode() {
  if (!pyodide) { showToast('Python 尚未就绪'); return; }
  const ed = document.getElementById('editor');
  if (!ed || !ed.value.trim()) { showToast('代码为空'); return; }

  const btn = document.getElementById('format-btn');
  const statusDot = document.getElementById('format-status');

  // 首次使用时安装 autopep8
  if (!_autopep8Ready) {
    if (_autopep8Loading) { showToast('autopep8 正在安装中...'); return; }
    _autopep8Loading = true;
    btn.style.opacity = '0.5';
    btn.style.pointerEvents = 'none';
    showToast('⏳ 正在安装 autopep8...');
    try {
      pyodide.globals.set('_fmt_pkg', 'autopep8');
      await pyodide.runPythonAsync(`import micropip; await micropip.install(_fmt_pkg)`);
      pyodide.globals.delete('_fmt_pkg');
      _autopep8Ready = true;
      statusDot.style.display = 'block';
    } catch(e) {
      showToast('autopep8 安装失败，请检查网络');
      _autopep8Loading = false;
      btn.style.opacity = '';
      btn.style.pointerEvents = '';
      return;
    }
    _autopep8Loading = false;
    btn.style.opacity = '';
    btn.style.pointerEvents = '';
  }

  // 执行格式化
  const original = ed.value;
  try {
    btn.style.opacity = '0.6';
    pyodide.globals.set('_fmt_code', original);
    const formatted = await pyodide.runPythonAsync(
      `import autopep8; autopep8.fix_code(_fmt_code, options={'aggressive': 1})`
    );
    pyodide.globals.delete('_fmt_code');
    if (formatted === original) {
      showToast('代码已是规范格式 ✓');
    } else {
      ed.value = formatted;
      if (tabs[activeTab]) tabs[activeTab].code = formatted;
      highlightCode();
      debounceSaveState();
      showToast('✓ 格式化完成');
    }
  } catch(e) {
    showToast('格式化失败: ' + (e.message || e));
  } finally {
    btn.style.opacity = '';
  }
}

async function copyVars(event) {

async function refreshVarsPanel() {
  if (!pyodide) return;
  const grid = document.getElementById('vars-grid');
  const countEl = document.getElementById('vars-count');
  try {
    // 用 Python 扫描 __main__ 中的用户变量，返回 JSON
    const result = await pyodide.runPythonAsync(`
import __main__, json, types, warnings, sys
warnings.filterwarnings("ignore", category=DeprecationWarning)

_SKIP_TYPES = (types.ModuleType, types.FunctionType, types.BuiltinFunctionType,
               types.BuiltinMethodType, type, types.MethodType)
_SKIP_PREFIXES = ('_', '__')

def _fmt_val(v):
    try:
        import numpy as _np
        if isinstance(v, _np.ndarray):
            return f'shape={v.shape} dtype={v.dtype}'
    except: pass
    _pd = sys.modules.get('pandas')
    if _pd is not None:
        try:
            if isinstance(v, _pd.DataFrame): return f'{len(v)} 行 × {len(v.columns)} 列'
            if isinstance(v, _pd.Series): return f'Series len={len(v)}'
        except: pass
    if isinstance(v, (list, tuple)):
        return f'len={len(v)}'
    if isinstance(v, dict):
        return f'{len(v)} keys'
    s = repr(v)
    return s[:60] + '…' if len(s) > 60 else s

def _type_label(v):
    try:
        import numpy as _np
        if isinstance(v, _np.ndarray): return 'ndarray'
    except: pass
    _pd = sys.modules.get('pandas')
    if _pd is not None:
        try:
            if isinstance(v, _pd.DataFrame): return 'DataFrame'
            if isinstance(v, _pd.Series): return 'Series'
        except: pass
    return type(v).__name__

rows = []
for _ in range(4):
    try:
        _items = list(__main__.__dict__.copy().items())
        break
    except RuntimeError:
        _items = []
for k, v in _items:
    if k.startswith('_'): continue
    if isinstance(v, _SKIP_TYPES): continue
    rows.append({'name': k, 'type': _type_label(v), 'value': _fmt_val(v)})

json.dumps(rows[:40])
`);

    const vars = JSON.parse(result);
    _currentVars = vars;
    countEl.textContent = vars.length;
    countEl.classList.toggle('visible', vars.length > 0);
    
    const copyBtn = document.getElementById('copy-vars-btn');
    if (copyBtn) copyBtn.style.display = vars.length > 0 ? 'flex' : 'none';

    if (vars.length === 0) {
      grid.innerHTML = '<div class="var-empty">运行后变量将显示在这里</div>';
      return;
    }

    grid.innerHTML = vars.map(v => `
      <div class="var-row">
        <span class="var-name">${escHtml(v.name)}</span>
        <span class="var-type">${escHtml(v.type)}</span>
        <span class="var-value">${escHtml(v.value)}</span>
      </div>`).join('');

    // 不再自动展开，仅控制“标题栏”是否在底部安静地显示
    const panel = document.getElementById('vars-panel');
    if (vars.length > 0) {
      panel.classList.add('has-vars');
    } else {
      panel.classList.remove('has-vars');
      _varsPanelOpen = false;
      panel.classList.remove('open');
    }
  } catch(e) {
    grid.innerHTML = '<div class="var-empty">无法读取变量</div>';
  }
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function smartCopy(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    try { await navigator.clipboard.writeText(text); return true; } catch (_) {}
  }
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  let ok = false;
  try { ok = document.execCommand('copy'); } catch (_) {}
  document.body.removeChild(ta);
  return ok;
}

    showToast('代码为空，无法导出'); 
    return; 
  }
  let filename = tabs[activeTab].name || 'script.py';
  if (!filename.endsWith('.py')) {
    filename += '.py';
  }
  const blob = new Blob([code], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast(`✅ 已导出: ${filename}`);
}

// ── 应用设置 ──
(function() {
  applyFontSize(settings.fontSize || 13);
  document.getElementById('font-size-select').value = settings.fontSize || 13;
  
  if (!settings.showLines) {
    const _ln2 = document.getElementById('line-numbers');
    if(_ln2) _ln2.style.display = 'none';
    document.getElementById('show-lines-toggle').classList.remove('on');
  }
  
  if (settings.wordWrap) {
    document.getElementById('word-wrap-toggle').classList.add('on');
    applyWordWrap(true);
  }

  if (!settings.autoIndent) document.getElementById('auto-indent-toggle').classList.remove('on');
  if (!settings.clearBeforeRun) document.getElementById('clear-before-run-toggle').classList.remove('on');
})();

// ── Start ──
renderTabs(); // 页面初始化时立即渲染所有恢复的 Tab（修复刷新后只显示一个的 bug）
initPyodide();
</script>
<script>
// 页面关闭时强制立即保存（绕过 debounce）
window.addEventListener('beforeunload', () => {
  clearTimeout(AppCore.storageManager.saveTimer);
  saveState();
});

AppCore.pwaManager = (() => {
  let deferredPrompt = null;
  const installBtn = () => document.getElementById('pwa-install-btn');

  const registerServiceWorker = () => {
    if (!('serviceWorker' in navigator)) return;
    navigator.serviceWorker.register('./sw.js')
      .then(r => console.log('[SW] registered:', r.scope))
      .catch(e => console.warn('[SW] register failed:', e));
  };

  const bindInstallEvents = () => {
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      const btn = installBtn();
      if (btn) btn.style.display = 'flex';
    });

    window.addEventListener('appinstalled', () => {
      deferredPrompt = null;
      const btn = installBtn();
      if (btn) btn.style.display = 'none';
      showToast('✓ PyRunner 已安装到桌面');
    });
  };

  const install = async () => {
    if (!deferredPrompt) {
      showToast('请使用浏览器菜单中的「安装」或「添加到主屏幕」');
      return;
    }
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    const btn = installBtn();
    if (btn) btn.style.display = 'none';
  };

  return {
    init() {
      window.addEventListener('load', registerServiceWorker);
      bindInstallEvents();
    },
    install,
  };
})();

function installPWA() {
  AppCore.pwaManager.install();
}

AppCore.pwaManager.init();
</script>
