<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PyRunner — Python 运行平台</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#C96B3A" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#E07840" media="(prefers-color-scheme: dark)">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PyRunner">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<link rel="icon" type="image/png" href="./favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- 极轻量的 PrismJS 用于代码高亮 -->
<link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js"></script>
<script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
<style>
  :root {
    --bg: #F7F5F2;
    --surface: #FFFFFF;
    --surface2: #F2F0EC;
    --surface3: #E8E5DF;
    --border: rgba(0,0,0,0.07);
    --border-md: rgba(0,0,0,0.11);
    --text: #1C1A17;
    --text2: #5A5750;
    --text3: #9C9890;
    --accent: #C96B3A;
    --accent-light: #F5E6DC;
    --accent-text: #7A3A18;
    --green: #2A7A4A;
    --green-bg: #E6F4EC;
    --red: #B02828;
    --red-bg: #FAEAEA;
    --blue: #1A5CA8;
    --blue-bg: #E4EEF9;
    --amber: #9A6A10;
    --amber-bg: #FDF3DC;
    --radius: 16px;
    --radius-sm: 9px;
    --radius-xs: 6px;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.05), 0 2px 8px rgba(0,0,0,0.04);
    --shadow: 0 2px 8px rgba(0,0,0,0.07), 0 8px 24px rgba(0,0,0,0.05);
    --mono: 'JetBrains Mono', 'Fira Code', monospace;
    --sans: 'Sora', system-ui, sans-serif;
    --header-h: 52px;
    --tabbar-h: 36px;
    --toolbar-h: 50px;
    --editor-font-size: 13px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141318;
      --surface: #1C1B22;
      --surface2: #232229;
      --surface3: #2C2B34;
      --border: rgba(255,255,255,0.06);
      --border-md: rgba(255,255,255,0.11);
      --text: #EEEAE4;
      --text2: #9E9B95;
      --text3: #575450;
      --accent: #E07840;
      --accent-light: #2A1A0C;
      --accent-text: #F4A872;
      --green: #4AAF72;
      --green-bg: #0C2016;
      --red: #E05858;
      --red-bg: #260E0E;
      --blue: #6BA3E8;
      --blue-bg: #0A1C32;
      --amber: #E0A840;
      --amber-bg: #201608;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); font-family: var(--sans); color: var(--text); }

  /* ── Layout ── */
  #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

  /* ── Header ── */
  header {
    display: flex; align-items: center;
    height: var(--header-h);
    padding: 0 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    gap: 10px;
    flex-shrink: 0;
  }
  .logo { display: flex; align-items: center; gap: 9px; }
  .logo-icon {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo-icon svg { width: 15px; height: 15px; fill: white; }
  .logo-name { font-size: 15px; font-weight: 600; letter-spacing: -0.4px; line-height: 1; }
  .logo-name span { color: var(--accent); }
  .logo-badge {
    font-size: 9px; font-weight: 600; letter-spacing: 0.4px;
    background: var(--accent-light); color: var(--accent-text);
    padding: 2px 6px; border-radius: 100px;
    text-transform: uppercase;
  }
  .header-spacer { flex: 1; }
  .header-actions { display: flex; gap: 5px; }
  .icon-btn {
    width: 32px; height: 32px;
    border: 1px solid var(--border-md);
    border-radius: var(--radius-xs);
    background: transparent;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--text3);
    transition: background 0.12s, color 0.12s, border-color 0.12s;
  }
  .icon-btn:hover { background: var(--surface2); color: var(--text2); border-color: var(--border-md); }
  .icon-btn:active { background: var(--surface3); transform: scale(0.95); }
  .icon-btn svg { width: 15px; height: 15px; }

  /* ── Tabs ── */
  #tab-bar {
    display: flex;
    height: var(--tabbar-h);
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 0 10px;
    gap: 1px;
    overflow-x: auto;
    scrollbar-width: none;
    flex-shrink: 0;
    align-items: stretch;
  }
  #tab-bar::-webkit-scrollbar { display: none; }
  .tab {
    display: flex; align-items: center; gap: 5px;
    padding: 0 10px;
    font-size: 11.5px; font-weight: 500;
    color: var(--text3);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: color 0.12s, border-color 0.12s, background 0.12s;
    border-radius: var(--radius-xs) var(--radius-xs) 0 0;
    margin-top: 4px;
  }
  .tab:hover { color: var(--text2); background: rgba(0,0,0,0.03); }
  @media (prefers-color-scheme: dark) { .tab:hover { background: rgba(255,255,255,0.04); } }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    background: var(--surface);
  }
  .tab-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--text3); flex-shrink: 0;
    transition: background 0.12s;
  }
  .tab.active .tab-dot { background: var(--accent); }
  .tab-name { max-width: 90px; overflow: hidden; text-overflow: ellipsis; }
  .tab-close {
    width: 16px; height: 16px; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: var(--text3);
    margin-left: 1px; flex-shrink: 0;
    transition: background 0.12s, color 0.12s;
  }
  .tab-close:hover { background: var(--surface3); color: var(--text); }
  .tab-add {
    display: flex; align-items: center; padding: 0 8px;
    color: var(--text3); cursor: pointer; font-size: 16px; font-weight: 400;
    transition: color 0.12s;
  }
  .tab-add:hover { color: var(--accent); }

  /* ── Editor area (Native Mobile Friendly) ── */
  #main { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  #editor-panel { flex: 1; display: flex; flex-direction: column; min-height: 0; position: relative; }
  
  #code-wrap {
    flex: 1; min-height: 120px; overflow: hidden;
    position: relative; display: flex;
    background: var(--surface);
  }
  #lines-wrap {
    width: 40px; flex-shrink: 0; background: var(--surface2);
    border-right: 1px solid var(--border);
    overflow: hidden; padding-top: 14px; padding-bottom: 60px;
    user-select: none;
  }
  #lines-content {
    font-family: var(--mono); font-size: var(--editor-font-size);
    line-height: 22px; color: var(--text3); text-align: right; padding-right: 8px;
  }
  .line-num-div { height: 22px; }
  .error-line-num { color: var(--red); font-weight: bold; }
  
  /* 原生滚动容器：允许左右、上下流畅滑动 */
  #edit-wrap { 
    flex: 1; position: relative; overflow: auto; 
    -webkit-overflow-scrolling: touch; 
  }
  
  /* 自动撑开内部空间，兼容横向超出 */
  #edit-content { 
    position: relative; 
    display: inline-block; /* 核心：子元素多宽它就多宽，确保横向滚动完美生效 */
    min-width: 100%; min-height: 100%; 
    vertical-align: top;
  }
  
  /* 错误行高亮层 */
  #error-highlight-layer { 
    position: absolute; top: 0; left: 0; right: 0; bottom: 0; 
    z-index: 0; pointer-events: none; 
  }
  .error-bg-line {
    position: absolute; left: 0; right: 0; height: 22px;
    background: rgba(176,40,40,0.1); border-left: 3px solid var(--red);
  }

  /* ── 核心同步对齐逻辑：确保文字框和高亮框 100% 重叠 ── */
  #code-editor, #code-highlight {
    /* 使用 !important 强制击穿所有的 Prism 默认干扰样式 */
    margin: 0 !important; border: 0 !important; 
    padding: 14px 10px 60px 10px !important; 
    font-family: var(--mono) !important; 
    font-size: var(--editor-font-size) !important;
    line-height: 22px !important; tab-size: 4 !important;
    white-space: pre !important; word-break: normal !important; 
    overflow-wrap: normal !important; box-sizing: border-box !important; 
    background: transparent !important;
    -webkit-text-size-adjust: none !important; text-size-adjust: none !important;
    letter-spacing: normal !important; word-spacing: normal !important;
  }
  
  /* 底层显示颜色（随内容自然撑大宽度） */
  #code-highlight {
    color: var(--text); z-index: 1; pointer-events: none;
    display: block; min-width: 100%; min-height: 100%;
  }
  
  /* 表层接受输入（完全覆盖在高亮层上方） */
  #code-editor {
    position: absolute; top: 0; left: 0; 
    width: 100%; height: 100%; /* 精准跟随 edit-content 尺寸 */
    color: transparent; caret-color: var(--accent);
    outline: none; resize: none; z-index: 2; 
    overflow: hidden; /* 不显示内部滚动条，由父级滑动 */
  }

  /* 彻底清理 PrismJS 内层干扰 */
  #code-highlight-code {
    padding: 0 !important; margin: 0 !important; background: transparent !important;
    border: none !important; box-shadow: none !important; text-shadow: none !important; 
    color: inherit; font-family: inherit !important; font-size: inherit !important; 
    line-height: inherit !important; white-space: inherit !important;
    tab-size: inherit !important; letter-spacing: inherit !important;
  }

  /* 自定义 PyRunner 高亮主题 */
  .token.comment { color: #9A9890; font-style: italic; }
  .token.keyword, .token.operator, .token.builtin, .token.boolean { color: #B85A28; font-weight: 600; }
  .token.string, .token.char { color: #2A7A4A; }
  .token.number { color: #1A5CA8; }
  .token.punctuation { color: #5A5750; }
  .token.function, .token.class-name { color: #7B3F00; }

  @media (prefers-color-scheme: dark) {
    .token.comment { color: #555250; }
    .token.keyword, .token.operator, .token.builtin, .token.boolean { color: #E07840; }
    .token.string, .token.char { color: #4AAF72; }
    .token.number { color: #6BA3E8; }
    .token.punctuation { color: #8A8780; }
    .token.function, .token.class-name { color: #E0A840; }
  }

  /* ── Toolbar ── */
  #toolbar {
    display: flex; align-items: center; gap: 5px;
    height: var(--toolbar-h);
    padding: 0 10px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  #toolbar::-webkit-scrollbar { display: none; }
  .run-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 0 16px;
    height: 34px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    font-family: var(--sans);
    font-size: 13px; font-weight: 600;
    cursor: pointer;
    transition: filter 0.12s, transform 0.1s;
    letter-spacing: 0.1px;
    flex-shrink: 0;
  }
  .run-btn:hover { filter: brightness(1.08); }
  .run-btn:active { filter: brightness(0.92); transform: scale(0.97); }
  .run-btn.loading { opacity: 0.65; pointer-events: none; }
  .run-btn svg { width: 12px; height: 12px; fill: white; flex-shrink: 0; }
  .toolbar-spacer { flex: 1; min-width: 4px; }
  .toolbar-divider { width: 1px; height: 18px; background: var(--border-md); flex-shrink: 0; margin: 0 2px; }
  .status-pill {
    display: flex; align-items: center; gap: 5px;
    font-size: 10.5px; font-weight: 600;
    padding: 4px 9px;
    border-radius: 100px;
    background: var(--surface2);
    color: var(--text3);
    transition: background 0.25s, color 0.25s;
    flex-shrink: 0;
    letter-spacing: 0.2px;
  }
  .status-pill.ready { background: var(--green-bg); color: var(--green); }
  .status-pill.loading { background: var(--blue-bg); color: var(--blue); }
  .status-pill.error { background: var(--red-bg); color: var(--red); }
  .status-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: currentColor; flex-shrink: 0;
  }
  .status-dot.pulse { animation: pulse 1.3s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .toolbar-icon-btn {
    width: 32px; height: 32px;
    border-radius: var(--radius-xs);
    border: 1px solid var(--border-md);
    background: transparent;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--text3);
    transition: background 0.12s, color 0.12s;
    flex-shrink: 0;
  }
  .toolbar-icon-btn:hover { background: var(--surface2); color: var(--text2); }
  .toolbar-icon-btn:active { background: var(--surface3); transform: scale(0.94); }
  .toolbar-icon-btn svg { width: 13px; height: 13px; }
  .toolbar-key-btn {
    height: 32px; padding: 0 8px;
    border-radius: var(--radius-xs);
    border: 1px solid var(--border-md);
    background: transparent;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--text2);
    font-family: var(--mono); font-size: 12px; font-weight: 500;
    transition: background 0.12s, color 0.12s;
    flex-shrink: 0;
    letter-spacing: 0.5px;
  }
  .toolbar-key-btn:hover { background: var(--surface2); }
  .toolbar-key-btn:active { background: var(--surface3); transform: scale(0.94); }

  /* ── Split panel ── */
  #resizer {
    height: 6px; background: var(--border); cursor: row-resize; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
    position: relative;
  }
  #resizer:hover, #resizer.dragging { background: var(--accent-light); }
  #resizer::after {
    content: ''; width: 36px; height: 3px;
    border-radius: 2px; background: var(--border-md);
    transition: background 0.15s;
  }
  #resizer:hover::after, #resizer.dragging::after { background: var(--accent); }

  /* ── Output panel ── */
  #output-panel {
    height: 240px; min-height: 80px; max-height: 72vh;
    display: flex; flex-direction: column;
    background: var(--surface);
    border-top: 2px solid var(--border);
  }
  #output-header {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    flex-shrink: 0;
    min-height: 36px;
  }
  #output-title {
    font-size: 10px; font-weight: 700; color: var(--text3);
    text-transform: uppercase; letter-spacing: 1px;
  }
  .output-spacer { flex: 1; }
  .output-action-btn {
    display: flex; align-items: center; gap: 4px;
    font-size: 11px; font-weight: 500; color: var(--text3);
    cursor: pointer; padding: 4px 8px;
    border-radius: var(--radius-xs);
    transition: background 0.12s, color 0.12s;
    border: 1px solid transparent;
  }
  .output-action-btn:hover { background: var(--surface3); color: var(--text2); border-color: var(--border); }
  .output-action-btn svg { width: 11px; height: 11px; }
  #output-scroll {
    flex: 1; overflow-y: auto; overflow-x: auto; padding: 12px 14px;
    scrollbar-width: thin; scrollbar-color: var(--border-md) transparent;
    -webkit-overflow-scrolling: touch;
  }
  #output-scroll::-webkit-scrollbar { width: 3px; }
  #output-scroll::-webkit-scrollbar-track { background: transparent; }
  #output-scroll::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 2px; }
  #output-content {
    font-family: var(--mono); font-size: 12.5px; line-height: 1.75;
    white-space: pre-wrap; word-break: break-all;
    color: var(--text);
  }
  .out-line { display: block; }
  .out-line.stderr { color: var(--red); }
  .out-line.success { color: var(--green); }
  .out-line.info { color: var(--text3); font-style: italic; }
  .out-line.image-out { margin: 10px 0; }
  .out-line.image-out img { max-width: 100%; border-radius: var(--radius-sm); border: 1px solid var(--border); }

  /* ── Placeholder ── */
  .output-placeholder {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; gap: 10px;
  }
  .output-placeholder-icon {
    width: 40px; height: 40px; border-radius: 12px;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
  }
  .output-placeholder-icon svg { width: 20px; height: 20px; color: var(--text3); }
  .output-placeholder p { font-size: 12px; color: var(--text3); }

  /* ── Bottom sheet drawer (shared) ── */
  .sheet-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    display: none; z-index: 100; align-items: flex-end;
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
  }
  .sheet-overlay.open { display: flex; }
  .sheet {
    width: 100%; background: var(--surface);
    border-radius: var(--radius) var(--radius) 0 0;
    display: flex; flex-direction: column;
    animation: slideUp 0.22s cubic-bezier(0.32,0.72,0,1);
    padding-bottom: env(safe-area-inset-bottom);
    box-shadow: 0 -4px 32px rgba(0,0,0,0.12);
  }
  @keyframes slideUp { from { transform: translateY(100%); opacity: 0.5; } to { transform: translateY(0); opacity: 1; } }
  .sheet-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--border-md); margin: 10px auto 2px; }
  .sheet-header { display: flex; align-items: center; padding: 10px 16px 8px; gap: 10px; }
  .sheet-title { font-size: 15px; font-weight: 600; flex: 1; letter-spacing: -0.2px; }

  /* ── Snippets ── */
  #snippets-overlay { max-height: 78vh; }
  #snippets-drawer { max-height: 78vh; }
  #snippets-list { overflow-y: auto; padding: 4px 10px 16px; flex: 1; }
  .snippet-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 8px;
    border-radius: 10px;
    cursor: pointer; transition: background 0.12s;
  }
  .snippet-item:hover { background: var(--surface2); }
  .snippet-item:active { background: var(--surface3); transform: scale(0.99); }
  .snippet-icon {
    width: 38px; height: 38px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 19px; flex-shrink: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
  }
  .snippet-text { flex: 1; min-width: 0; }
  .snippet-text .snippet-name { font-size: 13px; font-weight: 600; }
  .snippet-text .snippet-desc { font-size: 11.5px; color: var(--text3); margin-top: 1px; }
  .snippet-arrow { color: var(--text3); font-size: 16px; }

  /* ── Settings ── */
  #settings-drawer { max-height: 68vh; }
  #settings-body { overflow-y: auto; padding: 4px 16px 16px; flex: 1; }
  .setting-section-title {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.8px; color: var(--text3);
    padding: 12px 0 6px;
  }
  .setting-row {
    display: flex; align-items: center; padding: 11px 0;
    border-bottom: 1px solid var(--border); gap: 12px;
  }
  .setting-row:last-child { border-bottom: none; }
  .setting-label { flex: 1; }
  .setting-label p { font-size: 13px; font-weight: 500; }
  .setting-label span { font-size: 11.5px; color: var(--text3); margin-top: 1px; display: block; }
  select.setting-select {
    background: var(--surface2); border: 1px solid var(--border-md);
    color: var(--text); font-family: var(--sans); font-size: 12px;
    padding: 6px 10px; border-radius: var(--radius-sm); outline: none;
    cursor: pointer;
  }
  .toggle {
    width: 42px; height: 24px; border-radius: 100px;
    background: var(--surface3); border: 1px solid var(--border-md);
    position: relative; cursor: pointer; transition: background 0.2s, border-color 0.2s;
    flex-shrink: 0;
  }
  .toggle.on { background: var(--accent); border-color: var(--accent); }
  .toggle::after {
    content: ''; position: absolute;
    width: 18px; height: 18px; border-radius: 50%;
    background: white; top: 2px; left: 2px;
    transition: transform 0.2s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 0 1px 4px rgba(0,0,0,0.25);
  }
  .toggle.on::after { transform: translateX(18px); }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: calc(var(--toolbar-h) + 12px); left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text); color: var(--bg);
    padding: 9px 16px; border-radius: 100px;
    font-size: 12.5px; font-weight: 500;
    z-index: 400; transition: transform 0.25s cubic-bezier(0.32,0.72,0,1), opacity 0.25s;
    white-space: nowrap; opacity: 0;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18);
    pointer-events: none;
  }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* ── Loading overlay ── */
  #loading-overlay {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 500; gap: 0;
    transition: opacity 0.4s;
  }
  .loader-icon {
    width: 56px; height: 56px; border-radius: 14px;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 20px;
    box-shadow: 0 8px 24px rgba(201,107,58,0.3);
  }
  .loader-icon svg { width: 28px; height: 28px; fill: white; }
  .loader-logo { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; margin-bottom: 6px; }
  .loader-logo span { color: var(--accent); }
  .loader-subtitle { font-size: 12px; color: var(--text3); margin-bottom: 28px; }
  .loader-bar {
    width: 140px; height: 2px; background: var(--border);
    border-radius: 2px; overflow: hidden; margin-bottom: 12px;
  }
  .loader-fill {
    height: 100%; background: var(--accent); border-radius: 2px;
    width: 0%; transition: width 0.4s ease;
  }
  .loader-text { font-size: 11.5px; color: var(--text3); text-align: center; max-width: 220px; line-height: 1.5; }

  /* ── Input prompt ── */
  #stdin-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    display: none; align-items: flex-end; justify-content: center;
    z-index: 150;
    backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
  }
  #stdin-overlay.open { display: flex; }
  #stdin-box {
    background: var(--surface);
    border-radius: var(--radius) var(--radius) 0 0;
    padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
    width: 100%; max-width: 480px;
    animation: slideUp 0.22s cubic-bezier(0.32,0.72,0,1);
  }
  #stdin-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.8px; color: var(--text3); margin-bottom: 8px;
  }
  #stdin-prompt {
    font-size: 13px; color: var(--text); margin-bottom: 12px;
    font-family: var(--mono); background: var(--surface2);
    padding: 8px 12px; border-radius: var(--radius-xs);
    border-left: 3px solid var(--accent);
    min-height: 36px; word-break: break-all;
  }
  #stdin-input {
    width: 100%; padding: 11px 12px;
    border: 1.5px solid var(--border-md); border-radius: var(--radius-sm);
    background: var(--surface2); color: var(--text);
    font-family: var(--mono); font-size: 13px; outline: none;
    transition: border-color 0.15s;
  }
  #stdin-input:focus { border-color: var(--accent); }
  #stdin-submit {
    margin-top: 10px; width: 100%; padding: 12px;
    background: var(--accent); color: white; border: none;
    border-radius: var(--radius-sm); font-family: var(--sans);
    font-size: 13px; font-weight: 600; cursor: pointer;
    transition: filter 0.12s;
  }
  #stdin-submit:hover { filter: brightness(1.08); }
  #stdin-submit:active { filter: brightness(0.92); }
</style>
</head>

  <!-- Toolbar (above keyboard / at bottom) -->

<!-- Toast -->
<div id="toast"></div>

<script>
// ── State ──
let pyodide = null;
let activeTab = 0;
let isRunning = false;
let inputResolve = null;
const _defSettings = { autoIndent: true, clearBeforeRun: true, showLines: true, fontSize: 13 };
let settings = (() => {
  try { return Object.assign({}, _defSettings, JSON.parse(localStorage.getItem('pyrunner_settings') || '{}')); }
  catch(_) { return { ..._defSettings }; }
})();
function saveSettings() {
  try { localStorage.setItem('pyrunner_settings', JSON.stringify(settings)); } catch(_) {}
}

const _INITIAL_CODE = `# 欢迎使用 PyRunner！
# 支持完整的 Python 3.11 环境 + NumPy / Pandas / Matplotlib 等库

import math

def fibonacci(n):
    """生成斐波那契数列"""
    a, b = 0, 1
    result =[]
    for _ in range(n):
        result.append(a)
        a, b = b, a + b
    return result

# 基础示例
nums = fibonacci(10)
print("斐波那契数列:", nums)
print(f"第 10 项: {nums[-1]}")
print(f"黄金比例近似: {nums[-1] / nums[-2]:.6f}")
print(f"π 的值: {math.pi:.10f}")
`;

// ── 持久化（localStorage）──
function saveState() {
  try {
    tabs[activeTab].code = document.getElementById('code-editor').value;
    localStorage.setItem('pyrunner_tabs', JSON.stringify(tabs));
    localStorage.setItem('pyrunner_active', activeTab);
  } catch(_) {}
}
function loadState() {
  try {
    const saved = localStorage.getItem('pyrunner_tabs');
    if (saved) return { tabs: JSON.parse(saved), active: parseInt(localStorage.getItem('pyrunner_active')||'0') };
  } catch(_) {}
  return null;
}
const _savedState = loadState();
let tabs = _savedState ? _savedState.tabs :[{ name: 'main.py', code: _INITIAL_CODE || '' }];
if (_savedState) {
  activeTab = Math.min(_savedState.active, tabs.length - 1);
}
// 每 3 秒自动保存
setInterval(saveState, 3000);

// ── Editor Init ──
function initEditor(initialCode) {
  const ed = document.getElementById('code-editor');
  ed.value = initialCode;
  
  // Apply Settings
  document.documentElement.style.setProperty('--editor-font-size', (settings.fontSize || 13) + 'px');
  document.getElementById('lines-wrap').style.display = settings.showLines ? 'block' : 'none';

  // Listeners
  ed.addEventListener('input', updateHighlight);
  ed.addEventListener('keydown', handleEditorKeydown);
  
  // Sync Scroll for Line Numbers
  document.getElementById('edit-wrap').addEventListener('scroll', function() {
    document.getElementById('lines-wrap').scrollTop = this.scrollTop;
  });
  
  updateHighlight();
}

function handleEditorKeydown(e) {
  // Ctrl+Enter 运行
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault(); toggleRun(); return;
  }
  // Tab 缩进
  if (e.key === 'Tab') {
    e.preventDefault(); insertText('    '); return;
  }
  // 自动缩进
  if (e.key === 'Enter' && settings.autoIndent) {
    e.preventDefault();
    const ed = e.target;
    const s = ed.selectionStart;
    const lines = ed.value.substring(0, s).split('\n');
    const lastLine = lines[lines.length - 1];
    const indentMatch = lastLine.match(/^(\s*)/);
    const indent = indentMatch ? indentMatch[1] : '';
    const extraIndent = lastLine.trimEnd().endsWith(':') ? '    ' : '';
    insertText('\n' + indent + extraIndent);
  }
}

function insertText(text) {
  const ed = document.getElementById('code-editor');
  ed.focus();
  let success = false;
  try { success = document.execCommand('insertText', false, text); } catch(e){}
  if (!success) {
    const s = ed.selectionStart, e = ed.selectionEnd, val = ed.value;
    ed.value = val.substring(0, s) + text + val.substring(e);
    ed.selectionStart = ed.selectionEnd = s + text.length;
  }
  if (['()', '[]', '{}', '""', "''"].includes(text)) {
    ed.selectionStart = ed.selectionEnd = ed.selectionStart - 1;
  }
  updateHighlight();
}

function undoCode() {
  document.getElementById('code-editor').focus();
  try { document.execCommand('undo'); } catch(e) {}
}

function updateHighlight() {
  const ed = document.getElementById('code-editor');
  const hl = document.getElementById('code-highlight-code');
  let val = ed.value;
  
  // 核心修复：如果是以回车结尾，我们需要在传给 HTML 时追加一个 \n
  // 否则 <pre> 标签在渲染时会丢弃最后一个无内容的换行，导致高度不同步！
  if (val.endsWith('\n')) {
      val += '\n';
  }
  
  hl.innerHTML = Prism.highlight(val, Prism.languages.python, 'python');
  updateLineNumbers();
  if (tabs && tabs[activeTab]) tabs[activeTab].code = ed.value;
}

function updateLineNumbers() {
  if (!settings.showLines) return;
  const ed = document.getElementById('code-editor');
  const linesCount = ed.value.split('\n').length;
  const lc = document.getElementById('lines-content');
  if (lc._lastCount !== linesCount) {
    let html = '';
    for(let i=1; i<=linesCount; i++) html += `<div id="line-num-${i}" class="line-num-div">${i}</div>`;
    lc.innerHTML = html;
    lc._lastCount = linesCount;
  }
}

function highlightErrorLine(lineNo) {
  clearErrorHighlight();
  const top = 14 + (lineNo - 1) * 22; // padding + index * line-height
  document.getElementById('error-highlight-layer').innerHTML = `<div class="error-bg-line" style="top:${top}px;"></div>`;
  const ln = document.getElementById('line-num-' + lineNo);
  if (ln) ln.classList.add('error-line-num');
  document.getElementById('edit-wrap').scrollTop = Math.max(0, top - 60);
}

function clearErrorHighlight() {
  document.getElementById('error-highlight-layer').innerHTML = '';
  document.querySelectorAll('.error-line-num').forEach(el => el.classList.remove('error-line-num'));
}


// ── Pyodide init ──
async function initPyodide() {
  const _initCode = (tabs && tabs[activeTab]) ? tabs[activeTab].code : (_INITIAL_CODE || '');
  initEditor(_initCode);
  
  try {
    const setLoadMsg = (m, pct) => { const el = document.getElementById('loader-text'); if(el) el.textContent = m; if(pct!==undefined){const f=document.getElementById('loader-fill');if(f)f.style.width=pct+'%';} };
    setLoadMsg('正在初始化 Python 运行时...');
    pyodide = await loadPyodide({ indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.25.0/full/' });
    const pkgGroups =[
      { label: '加载数值计算库 (numpy, scipy)...', pkgs:['numpy', 'scipy', 'micropip'] },
      { label: '加载数据分析库 (pandas, statsmodels)...', pkgs: ['pandas', 'statsmodels'] },
      { label: '加载可视化库 (matplotlib, Pillow)...', pkgs: ['matplotlib', 'Pillow'] },
      { label: '加载机器学习库 (sklearn, sympy)...', pkgs:['scikit-learn', 'sympy'] },
      { label: '加载网络库 (networkx, pyodide-http)...', pkgs:['networkx', 'pyodide-http'] },
    ];
    for (const g of pkgGroups) {
      setLoadMsg(g.label);
      await pyodide.loadPackage(g.pkgs);
    }

    setLoadMsg('安装可视化库 (seaborn, plotly)...', 78);
    try {
      await pyodide.runPythonAsync("import micropip; await micropip.install(['seaborn', 'plotly'])");
    } catch(_) {}

    // ── 下载思源黑体 OTF 并注册给 Matplotlib（FreeType 只支持 TTF/OTF）──
    setLoadMsg('正在加载中文字体...', 88);
    try {
      // NotoSansCJK Regular OTF，托管于 jsDelivr，约 10 MB
      const fontUrl = 'https://cdn.jsdelivr.net/gh/googlefonts/noto-cjk@main/Sans/OTF/SimplifiedChinese/NotoSansCJKsc-Regular.otf';
      const fontResp = await fetch(fontUrl);
      if (!fontResp.ok) throw new Error('font fetch ' + fontResp.status);
      const fontBytes = new Uint8Array(await fontResp.arrayBuffer());
      pyodide.FS.writeFile('/tmp/NotoSansSC.otf', fontBytes);
      pyodide.runPython(`
import matplotlib.font_manager as fm, matplotlib as mpl
fe = fm.FontEntry(fname='/tmp/NotoSansSC.otf', name='Noto Sans SC')
fm.fontManager.ttflist.insert(0, fe)
mpl.rcParams['font.family'] = 'Noto Sans SC'
mpl.rcParams['axes.unicode_minus'] = False
`);
      showToast('Python 3.11 已就绪，中文字体已加载 ✓');
    } catch(fontErr) {
      console.warn('中文字体加载失败，降级:', fontErr);
      pyodide.runPython(`

mpl.rcParams['axes.unicode_minus'] = False
`);
      showToast('Python 3.11 已就绪（中文字体加载失败）');
    }

    setLoadMsg('就绪！', 100);
    setStatus('ready', '就绪');
    document.getElementById('run-btn').classList.remove('loading');
    setTimeout(() => {
      document.getElementById('loading-overlay').style.opacity = '0';
      setTimeout(() => { document.getElementById('loading-overlay').style.display = 'none'; }, 400);
    }, 300);
  } catch(e) {
    setStatus('error', '加载失败');
    appendOutput('⚠ Pyodide 加载失败，请检查网络连接\n' + e, 'stderr');
    document.getElementById('loading-overlay').style.display = 'none';
  }
}

// ── Run / Stop ──
let _stopRequested = false;
function toggleRun() { if (isRunning) { _stopRequested = true; } else { runCode(); } }
function setRunBtn(running) {
  const btn = document.getElementById('run-btn');
  const icon = document.getElementById('run-icon');
  const label = document.getElementById('run-label');
  if (running) {
    btn.classList.remove('loading');
    icon.innerHTML = '<rect x="6" y="6" width="12" height="12" rx="2"/>';
    label.textContent = '停止';
    btn.style.background = 'var(--red)';
  } else {
    icon.innerHTML = '<path d="M8 5v14l11-7z"/>';
    label.textContent = '运行';
    btn.style.background = '';
  }
}

async function runCode() {
  if (!pyodide || isRunning) return;
  const code = document.getElementById('code-editor').value;
  if (!code.trim()) { showToast('请输入代码'); return; }
  isRunning = true;
  _stopRequested = false;
  setRunBtn(true);
  setStatus('loading', '运行中');
  if (settings.clearBeforeRun) clearOutput();

  const t0 = performance.now();
  let outputEl = document.getElementById('output-content');

  // Redirect stdout/stderr（只注册一次）
  if (!window._captureInstalled) {
    window._captureInstalled = true;
    pyodide.runPython(`
import sys, io
class _Capture(io.TextIOBase):
    def __init__(self, kind):
        self.kind = kind
    def write(self, s):
        import js
        js._pyrunner_write(self.kind, s)
        return len(s)
    def flush(self): pass
sys.stdout = _Capture('stdout')
sys.stderr = _Capture('stderr')
`);
    window._pyrunner_write = (kind, s) => appendOutput(s, kind === 'stderr' ? 'stderr' : null);
  }

  // Override input()（只安装一次）
  if (!window._inputInstalled) {
    window._inputInstalled = true;
    pyodide.runPython(`
import builtins
_orig_input = builtins.input
def _custom_input(prompt=""):
    import js
    return js._pyrunner_input(str(prompt))
builtins.input = _custom_input
`);
  }
  window._pyrunner_input = (prompt) => {
    return new Promise(resolve => {
      document.getElementById('stdin-prompt').textContent = prompt || '请输入：';
      document.getElementById('stdin-input').value = '';
      document.getElementById('stdin-overlay').classList.add('open');
      document.getElementById('stdin-input').focus();
      inputResolve = resolve;
    });
  };
  document.getElementById('stdin-submit').onclick = () => {
    const val = document.getElementById('stdin-input').value;
    document.getElementById('stdin-overlay').classList.remove('open');
    if (inputResolve) { inputResolve(val); inputResolve = null; }
  };
  document.getElementById('stdin-input').onkeydown = (e) => {
    if (e.key === 'Enter') document.getElementById('stdin-submit').click();
  };

  try {
    // ── 自动检测并安装缺失的包 ──
    const importLines = code.match(/^\s*(?:import|from)\s+([a-zA-Z_][a-zA-Z0-9_]*)/gm) ||[];
    const pkgSet = new Set();
    importLines.forEach(line => {
      const m = line.match(/^\s*(?:import|from)\s+([a-zA-Z_][a-zA-Z0-9_]*)/);
      if (m) pkgSet.add(m[1]);
    });
    // 标准库 + 已预装的包，无需尝试安装
    const builtins = new Set([
      // ── Python 标准库（完整） ──
      'sys','os','io','re','math','time','json','random','datetime','collections',
      'itertools','functools','pathlib','string','struct','hashlib','base64',
      'copy','types','abc','enum','typing','dataclasses','contextlib','warnings',
      'traceback','inspect','gc','weakref','threading','queue','subprocess',
      'builtins','importlib','unittest','doctest','pprint','textwrap','shutil',
      'tempfile','glob','fnmatch','stat','errno','signal','platform','sysconfig',
      'asyncio','concurrent','multiprocessing','socket','ssl','http','urllib',
      'email','html','xml','csv','sqlite3','decimal','fractions','statistics',
      'array','bisect','heapq','operator','functools','cmath','numbers',
      'codecs','unicodedata','locale','gettext','argparse','logging','unittest',
      'difflib','readline','rlcompleter','zipfile','tarfile','gzip','bz2','lzma',
      'zlib','pickle','shelve','marshal','dbm','venv','code','codeop',
      'tokenize','token','ast','dis','compileall','py_compile','keyword',
      'symtable','linecache','tokenize','colorsys','imghdr','wave','chunk',
      'struct','select','selectors','socketserver','xmlrpc','ctypes','cffi',
      'uuid','secrets','hmac','binascii','quopri','uu','netrc','ftplib',
      'poplib','imaplib','smtplib','telnetlib','nntplib','calendar','sched',
      'timezone','zoneinfo','profile','pstats','timeit','cProfile',
      'trace','sys','atexit','faulthandler','site','sitecustomize',
      // ── Pyodide 预装 / 内置 ──
      'numpy','pandas','matplotlib','scipy','sklearn','scikit_learn',
      'sympy','PIL','Pillow','statsmodels','micropip',
      'js','pyodide','_pyodide','pyodide_http',
      // 子模块（from X import Y 只提取 X，这里列出常见顶层名）
      'cv2','skimage','plotly','bokeh','altair','seaborn','networkx','xgboost','lightgbm','requests','pyodide_http','pyodide-http','plotly.graph_objects','plotly.express','go','px',
      'requests','aiohttp','flask','fastapi','pydantic','attrs','tqdm',
      // ── 常见顶层别名 ──
      'np','pd','plt','sp','sns',
    ]);
    const toInstall = [...pkgSet].filter(p => !builtins.has(p));
    if (toInstall.length > 0) {
      appendOutput(`📦 检测到未预装的包，正在自动安装: ${toInstall.join(', ')}...\n`, 'info');
      // 优先用 loadPackage（Pyodide 原生编译包），失败再用 micropip（PyPI 纯 Python 包）
      for (const pkg of toInstall) {

              `import micropip as _mp, sys as _sys\n` +
              `if '${pipName}' not in _sys.modules:\n` +
              `    await _mp.install('${pkg}')\n`
            );
            appendOutput(`  ✓ ${pkg} 安装成功 (PyPI)\n`, 'success');
            installed = true;
          } catch (err2) {
            appendOutput(`  ✗ ${pkg} 安装失败（可能含 C 扩展或网络问题）\n`, 'stderr');
          }
        }
      }
    }

    // Handle matplotlib + 确保每次运行都应用中文字体
    const hasPlt = code.includes('matplotlib') || code.includes('plt.');
    if (hasPlt) {
      pyodide.runPython(`
import matplotlib
matplotlib.use('Agg')
import matplotlib as mpl, matplotlib.font_manager as fm

        fm.fontManager.ttflist.insert(0, fe)

mpl.rcParams['axes.unicode_minus'] = False

    }

    // ── 运行前同步编辑器内容 ──
    tabs[activeTab].code = document.getElementById('code-editor').value;
    
    // ── 运行前快照 __main__ 的 key 集合 ──
    const _preRunKeys = new Set(
      pyodide.runPython("import __main__; list(vars(__main__).keys())").toJs()
    );

    const _userResult = await pyodide.runPythonAsync(code);

    // ── 图像收集 ──
    pyodide.runPython([
      "import sys as _sys, io as _io, base64 as _b64",
      "",
      "_PNG_SIG = bytes([137,80,78,71,13,10,26,10])",
      "_JPG_SIG = bytes([255,216,255])",
      "_GIF_SIG = bytes([71,73,70,56])",
      "_BMP_SIG = bytes([66,77])",
      "_WEBP_SIG = bytes([82,73,70,70])",
      "",
      "def _to_png_b64(img_obj):",
      "    _b = _io.BytesIO()",
      "    img_obj.save(_b, format='PNG')",
      "    _b.seek(0)",
      "    return _b64.b64encode(_b.read()).decode()",
      "",
      "def _bytes_to_b64(raw):",
      "    raw = bytes(raw)",
      "    if raw[:8] == _PNG_SIG: mime='png'",
      "    elif raw[:3] == _JPG_SIG: mime='jpeg'",
      "    elif raw[:4] == _GIF_SIG: mime='gif'",
      "    elif raw[:2] == _BMP_SIG: mime='bmp'",
      "    elif raw[:4] == _WEBP_SIG and raw[8:12]==b'WEBP': mime='webp'",
      "    else: return None, None",
      "    return _b64.b64encode(raw).decode(), mime",
      "",
      "def _pyrunner_collect(extra=None):",
      "    _images  = []",
      "    _plotlys =[]",
      "    _seen    = set()",
      "",
      "    import __main__",
      "    _ns = dict(vars(__main__))",
      "",
      "    def _absorb(v):",
      "        if id(v) in _seen: return",
      "        _seen.add(id(v))",
      "",
      "        try:",
      "            from plotly.basedatatypes import BaseFigure as _BF",
      "            if isinstance(v, _BF):",
      "                _plotlys.append(v.to_json())",
      "                return",
      "        except Exception: pass",
      "",
      "        try:",
      "            import matplotlib.figure as _mf",
      "            if isinstance(v, _mf.Figure):",
      "                _buf = _io.BytesIO()",
      "                v.savefig(_buf, format='png', dpi=130, bbox_inches='tight')",
      "                _buf.seek(0)",
      "                _images.append((_b64.b64encode(_buf.read()).decode(), 'png'))",
      "                return",
      "        except Exception: pass",
      "",
      "        try:",
      "            from PIL.Image import Image as _PI",
      "            if isinstance(v, _PI):",
      "                _images.append((_to_png_b64(v), 'png'))",
      "                return",
      "        except Exception: pass",
      "",
      "        try:",
      "            import pandas as _pd",
      "            if isinstance(v, _pd.DataFrame) and len(v) > 0:",
      "                _html = v.to_html(max_rows=50, max_cols=20, border=0, classes=\'pr-table\', justify=\'left\')",

      "        try:",
      "            import pandas as _pd",
      "            if isinstance(v, _pd.Series) and len(v) > 0:",
      "                _dfs = v.reset_index()",
      "                _dfs.columns = [str(c) for c in _dfs.columns]",
      "                _html = _dfs.to_html(max_rows=50, border=0, classes='pr-table')",
      "                _images.append(('__html__:' + _html, 'html'))",
      "                return",
      "        except Exception: pass",
      "",
      "        try:",
      "            _fig2 = getattr(v, 'fig', None) or getattr(v, 'figure', None)",
      "            if _fig2 is not None and hasattr(_fig2, 'savefig') and id(_fig2) not in _seen:",
      "                _seen.add(id(_fig2))",
      "                _buf2 = _io.BytesIO()",
      "                _fig2.savefig(_buf2, format='png', dpi=130, bbox_inches='tight')",
      "                _buf2.seek(0)",
      "                _images.append((_b64.b64encode(_buf2.read()).decode(), 'png'))",
      "                return",
      "        except Exception: pass",
      "",
      "        try:",
      "            import numpy as _np",
      "            if isinstance(v, _np.ndarray) and v.dtype in (_np.uint8, _np.float32, _np.float64):",
      "                if v.ndim == 2 or (v.ndim == 3 and v.shape[2] in (3,4)):",
      "                    from PIL import Image as _PILMod",
      "                    if v.dtype != _np.uint8:",
      "                        _mn,_mx = v.min(), v.max()",
      "                        if _mx > _mn: v = ((v-_mn)/(_mx-_mn)*255).astype(_np.uint8)",
      "                        else: v = _np.zeros_like(v, dtype=_np.uint8)",
      "                    _img = _PILMod.fromarray(v)",
      "                    _images.append((_to_png_b64(_img), 'png'))",
      "                    return",
      "        except Exception: pass",
      "",
      "        try:",
      "            if isinstance(v, (bytes, bytearray)) and len(v) > 100:",
      "                _b64s, _mime = _bytes_to_b64(v)",
      "                if _b64s: _images.append((_b64s, _mime))",
      "        except Exception: pass",
      "",
      "        try:",
      "            if isinstance(v, _io.BytesIO):",
      "                v.seek(0)",
      "                raw = v.read()",
      "                if len(raw) > 100:",
      "                    _b64s, _mime = _bytes_to_b64(raw)",
      "                    if _b64s: _images.append((_b64s, _mime))",

      "",
      "        try:",
      "            if isinstance(v, (list, tuple)) and 1 <= len(v) <= 64:",
      "                from PIL.Image import Image as _PI2",
      "                import numpy as _np2",
      "                _all_img = all(isinstance(x, (_PI2, _np2.ndarray)) for x in v)",
      "                if _all_img:",

      "            _fig_obj = _plt.figure(_fn)",
      "            if id(_fig_obj) not in _seen:",
      "                _seen.add(id(_fig_obj))",
      "                _buf = _io.BytesIO()",
      "                _fig_obj.savefig(_buf, format='png', dpi=130, bbox_inches='tight')",
      "                _buf.seek(0)",
      "                _images.append((_b64.b64encode(_buf.read()).decode(), 'png'))",
      "        _plt.close('all')",
      "    except Exception: pass",
      "",
      "    for _v in list(_ns.values()):",
      "        _absorb(_v)",
      "",
      "    return [_images, _plotlys]",
    ].join("\n"));

    pyodide.globals.set("_pyrunner_retval", _userResult ?? null);
    const _raw = pyodide.runPython("_pyrunner_collect(extra=_pyrunner_retval)");
    const _imgPairs   = _raw.get(0).toJs();
    const plotlyJsons = _raw.get(1).toJs();
    _raw.destroy();
    
    const b64List = _imgPairs.map(p => Array.isArray(p) ? p[0] : p);
    const mimeList = _imgPairs.map(p => Array.isArray(p) ? p[1] : 'png');

    // ── 渲染 Plotly 交互图表 ──
    if (plotlyJsons && plotlyJsons.length > 0) {
      if (!window.Plotly) {
        appendOutput('⏳ 正在加载 Plotly.js...\n', 'info');

    // ── 渲染图像 / DataFrame 表格 ──
    for (let _ri = 0; _ri < b64List.length; _ri++) {

          document.head.appendChild(st);

      }
      if (b64.length < 100) continue;
      const img = document.createElement('img');
      img.style.cssText = 'max-width:100%;border-radius:10px;border:1px solid var(--border);margin:10px 0;display:block;cursor:zoom-in;';
      img.onerror = () => img.remove();
      img.src = `data:image/${mime};base64,${b64}`;
      img.onclick = () => {
        const ov = document.createElement('div');
        ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;';
        const bi = document.createElement('img');
        bi.src = img.src;
        bi.style.cssText = 'max-width:100%;max-height:90dvh;border-radius:10px;';
        const tip = document.createElement('div');
        tip.textContent = '点击任意处关闭';

        ov.append(bi, tip);
        ov.onclick = () => ov.remove();
        document.body.appendChild(ov);
      };
      const wrap2 = document.createElement('span');
      wrap2.className = 'out-line image-out';
      wrap2.appendChild(img);
      outputEl.appendChild(wrap2);
    }

    // ── 渲染完成后清理本次新增的用户变量 ──
    const _INTERNAL_PREFIX =['_pyrunner_', '_PNG_SIG', '_JPG_SIG', '_GIF_SIG',
      '_BMP_SIG', '_WEBP_SIG', '_to_png_b64', '_bytes_to_b64', '_b64', '_io', '_sys',
      '_orig_input', '_custom_input', '_Capture', '_pr_'];
    const _postRunKeys = pyodide.runPython("list(vars(__main__).keys())").toJs();
    const _newKeys = _postRunKeys.filter(k =>
      !_preRunKeys.has(k) &&
      !_INTERNAL_PREFIX.some(p => k.startsWith(p)) &&
      k !== '_pr_del'
    );
    if (_newKeys.length > 0) {
      pyodide.globals.set("_pr_del", pyodide.toPy(_newKeys));
      pyodide.runPython(
        "import __main__\n" +
        "(lambda keys:[delattr(__main__, k) for k in keys if hasattr(__main__, k)])(_pr_del)\n" +
        "del _pr_del"
      );
    }

    const elapsed = ((performance.now() - t0) / 1000).toFixed(3);
    appendOutput(`\n✓ 运行完成，耗时 ${elapsed}s`, 'success');
    setStatus('ready', '就绪');
  } catch(e) {
    if (_stopRequested) {
      appendOutput('\n⏹ 已手动停止执行', 'info');
      setStatus('ready', '就绪');
    } else {
      const raw = e.message || String(e);
      const lines = raw.split('\n');
      const execIdx = lines.findIndex(l => l.includes('<exec>'));
      const relevant = execIdx >= 0 ? lines.slice(execIdx) : lines.slice(-8);
      appendOutput('\n' + relevant.join('\n'), 'stderr');
      const lineMatch = raw.match(/line (\d+)/);
      if (lineMatch) highlightErrorLine(parseInt(lineMatch[1]));
      setStatus('error', '出错');
      setTimeout(() => { setStatus('ready', '就绪'); clearErrorHighlight(); }, 4000);
    }
  }
  isRunning = false;
  _stopRequested = false;
  setRunBtn(false);
}

// ── Output helpers ──
let _outputRaf = null;

function appendOutput(text, cls) {
  const el = document.getElementById('output-content');
  const ph = el.querySelector('.output-placeholder');
  if (ph) ph.remove();
  const parts = text.split('\n');
  parts.forEach((part, i) => {
    const isLast = i === parts.length - 1;
    if (isLast && part === '') return;
    const prev = el.lastChild;
    if (i === 0 && prev && prev._lineOpen && prev._cls === (cls||'')) {
      prev.textContent += part;
      if (!isLast) { prev.textContent += '\n'; prev._lineOpen = false; }
    } else {
      const span = document.createElement('span');
      span.className = 'out-line' + (cls ? ' ' + cls : '');
      span.textContent = part + (!isLast ? '\n' : '');
      span._cls = cls || '';
      span._lineOpen = isLast; 
      el.appendChild(span);
    }
  });
  scrollOutput();
  trimOutputIfNeeded();
}

function clearOutput() {
  document.getElementById('output-content').innerHTML = '';
  const lc = document.getElementById('output-linecount'); if(lc) lc.textContent='';
}

const MAX_OUTPUT_LINES = 2000;
function trimOutputIfNeeded() {
  const el = document.getElementById('output-content');
  const spans = el.querySelectorAll('.out-line');
  if (spans.length > MAX_OUTPUT_LINES) {
    const notice = document.createElement('span');
    notice.className = 'out-line info';
    notice.textContent = `… 输出过多，已截断至最新 ${MAX_OUTPUT_LINES} 行 …\n`;
    for (let i = 0; i < spans.length - MAX_OUTPUT_LINES; i++) spans[i].remove();
    el.insertBefore(notice, el.firstChild);
  }
}

function scrollOutput() {
  const s = document.getElementById('output-scroll');
  if (_outputRaf) return;
  _outputRaf = requestAnimationFrame(() => {
    s.scrollTop = s.scrollHeight; _outputRaf = null;
    const lc = document.getElementById('output-linecount');
    if (lc) { const n = document.getElementById('output-content').querySelectorAll('.out-line').length; lc.textContent = n > 0 ? n + ' 行' : ''; }
  });
}

// ── Status ──
function setStatus(kind, text) {
  const pill = document.getElementById('status');
  const dot = pill.querySelector('.status-dot');
  const txt = document.getElementById('status-text');
  pill.className = 'status-pill ' + kind;
  txt.textContent = text;
  dot.className = 'status-dot' + (kind === 'loading' ? ' pulse' : '');
}

// ── Tabs ──
let tabCounter = 1;
function startRenameTab(idx, div) {
  const nameEl = div.querySelector('.tab-name'); if (!nameEl) return;
  const old = tabs[idx].name;
  const inp = document.createElement('input');
  inp.value = old;
  inp.style.cssText = 'width:80px;font-size:12px;font-family:var(--sans);font-weight:500;background:var(--surface3);border:1px solid var(--accent);border-radius:4px;padding:0 4px;color:var(--text);outline:none;';
  nameEl.replaceWith(inp); inp.focus(); inp.select();
  const commit = () => { const v = inp.value.trim()||old; tabs[idx].name = v.endsWith('.py')?v:v+'.py'; renderTabs(); saveState(); };
  inp.onblur = commit;
  inp.onkeydown = (e) => { if(e.key==='Enter'){e.preventDefault();inp.blur();} if(e.key==='Escape'){inp.value=old;inp.blur();} };
}
function addTab() {
  tabCounter++;
  tabs.push({ name: 'script' + tabCounter + '.py', code: '# 新文件\nprint("Hello, World!")\n' });
  switchTab(tabs.length - 1);
  renderTabs();
}

function switchTab(idx) {
  tabs[activeTab].code = document.getElementById('code-editor').value;
  activeTab = idx;
  document.getElementById('code-editor').value = tabs[idx].code || '';
  updateHighlight();
  renderTabs();
}

function removeTab(e, idx) {
  e.stopPropagation();
  if (tabs.length === 1) { showToast('至少保留一个标签页'); return; }
  tabs.splice(idx, 1);
  activeTab = Math.min(activeTab, tabs.length - 1);
  document.getElementById('code-editor').value = tabs[activeTab].code || '';
  updateHighlight();
  renderTabs();
}

function renderTabs() {
  const bar = document.getElementById('tab-bar');
  bar.innerHTML = '';
  tabs.forEach((t, i) => {
    const div = document.createElement('div');
    div.className = 'tab' + (i === activeTab ? ' active' : '');
    div.innerHTML = `<span style="width:6px;height:6px;border-radius:50%;background:${i===activeTab?'var(--accent)':'var(--text3)'};display:inline-block;flex-shrink:0;margin-right:2px;"></span><span class="tab-name">${t.name}</span><span class="tab-close" onclick="removeTab(event,${i})">×</span>`;
    div.addEventListener('click', () => switchTab(i));
    div.addEventListener('dblclick', (ev) => { ev.stopPropagation(); startRenameTab(i, div); });
    bar.appendChild(div);
  });
  const add = document.createElement('div');
  add.className = 'tab-add';
  add.textContent = '+';
  add.onclick = addTab;
  bar.appendChild(add);
}
document.getElementById('add-tab-btn').onclick = addTab;

// ── Resizer ──
let resizing = false, startY = 0, startH = 0;
const resizer = document.getElementById('resizer');
const outputPanel = document.getElementById('output-panel');
resizer.addEventListener('pointerdown', (e) => {
  resizing = true; startY = e.clientY; startH = outputPanel.offsetHeight;
  resizer.classList.add('dragging');
  e.preventDefault();
});
window.addEventListener('pointermove', (e) => {
  if (!resizing) return;
  const delta = startY - e.clientY;
  const newH = Math.max(80, Math.min(window.innerHeight * 0.7, startH + delta));
  outputPanel.style.height = newH + 'px';
});
window.addEventListener('pointerup', () => { resizing = false; resizer.classList.remove('dragging'); });

function renderSnippets() {
  const list = document.getElementById('snippets-list');
  list.innerHTML = '';
  SNIPPETS.forEach(s => {
    const div = document.createElement('div');
    div.className = 'snippet-item';
    div.innerHTML = `<div class="snippet-icon">${s.icon}</div><div class="snippet-text"><div class="snippet-name">${s.name}</div><div class="snippet-desc">${s.desc}</div></div><span class="snippet-arrow">›</span>`;
    div.onclick = () => {
      document.getElementById('code-editor').value = s.code;
      updateHighlight();
      closeSnippets();
      showToast('已加载: ' + s.name);
    };
    list.appendChild(div);
  });
}
renderSnippets();

function closeSnippets(e) {
  if (!e || e.target === document.getElementById('snippets-overlay')) {
    document.getElementById('snippets-overlay').classList.remove('open');
  }
}
function closeSettings(e) {
  if (!e || e.target === document.getElementById('settings-overlay')) {
    document.getElementById('settings-overlay').classList.remove('open');
  }
}
document.getElementById('snippet-btn').onclick = () => {
  document.getElementById('snippets-overlay').classList.add('open');
};
document.getElementById('settings-btn').onclick = () => {
  document.getElementById('settings-overlay').classList.add('open');
};

// ── Settings ──
function applyFontSize(v) {
  settings.fontSize = parseInt(v);
  document.documentElement.style.setProperty('--editor-font-size', settings.fontSize + 'px');
  saveSettings();
}
function toggleSetting(key) {
  const map = { 'auto-indent': 'autoIndent', 'clear-before-run': 'clearBeforeRun', 'show-lines': 'showLines' };
  const k = map[key];
  settings[k] = !settings[k];
  saveSettings();
  document.getElementById(key + '-toggle').classList.toggle('on', settings[k]);
  if (key === 'show-lines') {
    document.getElementById('lines-wrap').style.display = settings.showLines ? 'block' : 'none';
  }
}

// ── Toast ──
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── 复制工具（兼容 file:// 和浏览器环境）──
async function smartCopy(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    try { await navigator.clipboard.writeText(text); return true; } catch (_) {}
  }
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  let ok = false;
  try { ok = document.execCommand('copy'); } catch (_) {}
  document.body.removeChild(ta);
  return ok;
}

function flashCopyBtn(id) {
  const btn = document.getElementById(id);
  if (!btn) return;
  const orig = btn.innerHTML;
  btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:14px;height:14px"><path d="M20 6L9 17l-5-5"/></svg>';
  btn.style.color = 'var(--green)';
  setTimeout(() => { btn.innerHTML = orig; btn.style.color = ''; }, 1400);
}

async function copyOutput() {
  const text = document.getElementById('output-content').textContent.trim();
  if (!text) { showToast('输出为空'); return; }
  const ok = await smartCopy(text);
  if (ok) { flashCopyBtn('copy-output-btn'); showToast('已复制输出内容 \u2713'); }
  else showToast('复制失败，请手动选择文本');
}

function clearEditor() {
  const ed = document.getElementById('code-editor');
  if (!ed.value.trim()) return;
  // 二次确认防误触
  const btn = document.getElementById('clear-editor-btn');
  if (btn._confirmPending) {
    clearTimeout(btn._confirmTimer);
    btn._confirmPending = false;
    btn.style.color = '';
    btn.title = '清空编辑器';
    ed.value = '';
    updateHighlight();
    clearErrorHighlight();
    saveState();
    showToast('已清空');
  } else {
    btn._confirmPending = true;
    btn.style.color = 'var(--red)';
    btn.title = '再次点击确认清空';
    showToast('再次点击确认清空');
    btn._confirmTimer = setTimeout(() => {
      btn._confirmPending = false;
      btn.style.color = '';
      btn.title = '清空编辑器';
    }, 2500);
  }
}

async function copyCode() {
  const text = document.getElementById('code-editor').value;
  if (!text.trim()) { showToast('代码为空'); return; }
  const ok = await smartCopy(text);
  if (ok) { flashCopyBtn('copy-code-btn'); showToast('已复制代码 \u2713'); }
  else showToast('复制失败，请手动选择文本');
}

// ── 应用已保存的设置 ──
(function() {
  document.getElementById('font-size-select').value = settings.fontSize || 13;
  if (!settings.showLines) document.getElementById('show-lines-toggle').classList.remove('on');
  if (!settings.autoIndent) document.getElementById('auto-indent-toggle').classList.remove('on');
  if (!settings.clearBeforeRun) document.getElementById('clear-before-run-toggle').classList.remove('on');
})();

// ── PWA 安装提示 ──
let _deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _deferredPrompt = e;
  if (!localStorage.getItem('pwa_prompted')) {
    setTimeout(() => {
      showToast('📲 可安装到桌面 — 点击浏览器菜单「添加到主屏幕」');
      localStorage.setItem('pwa_prompted', '1');
    }, 4000);
  }
  const btn = document.getElementById('pwa-install-btn');
  if (btn) btn.style.display = 'flex';
});
window.addEventListener('appinstalled', () => {
  _deferredPrompt = null;
  const btn = document.getElementById('pwa-install-btn');
  if (btn) btn.style.display = 'none';
  showToast('✓ PyRunner 已安装到桌面');
});
function installPWA() {
  if (!_deferredPrompt) { showToast('请使用浏览器菜单中的「安装」或「添加到主屏幕」'); return; }
  _deferredPrompt.prompt();
  _deferredPrompt.userChoice.then(() => {
    _deferredPrompt = null;
    const btn = document.getElementById('pwa-install-btn');
    if (btn) btn.style.display = 'none';
  });
}
</script>
