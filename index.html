<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PyRunner — Python 运行平台</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#C96B3A" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#E07840" media="(prefers-color-scheme: dark)">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PyRunner">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<link rel="icon" type="image/png" href="./favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js"></script>
<style>
  :root {
    --bg: #F7F5F2;
    --surface: #FFFFFF;
    --surface2: #F2F0EC;
    --surface3: #E8E5DF;
    --border: rgba(0,0,0,0.07);
    --border-md: rgba(0,0,0,0.11);
    --text: #1C1A17;
    --text2: #5A5750;
    --text3: #9C9890;
    --accent: #C96B3A;
    --accent-light: #F5E6DC;
    --accent-text: #7A3A18;
    --green: #2A7A4A;
    --green-bg: #E6F4EC;
    --red: #B02828;
    --red-bg: #FAEAEA;
    --blue: #1A5CA8;
    --blue-bg: #E4EEF9;
    --amber: #9A6A10;
    --amber-bg: #FDF3DC;
    --radius: 16px;
    --radius-sm: 9px;
    --radius-xs: 6px;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.05), 0 2px 8px rgba(0,0,0,0.04);
    --shadow: 0 2px 8px rgba(0,0,0,0.07), 0 8px 24px rgba(0,0,0,0.05);
    --mono: 'JetBrains Mono', 'Fira Code', monospace;
    --sans: 'Sora', system-ui, sans-serif;
    --header-h: 52px;
    --tabbar-h: 36px;
    --toolbar-h: 50px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141318;
      --surface: #1C1B22;
      --surface2: #232229;
      --surface3: #2C2B34;
      --border: rgba(255,255,255,0.06);
      --border-md: rgba(255,255,255,0.11);
      --text: #EEEAE4;
      --text2: #9E9B95;
      --text3: #575450;
      --accent: #E07840;
      --accent-light: #2A1A0C;
      --accent-text: #F4A872;
      --green: #4AAF72;
      --green-bg: #0C2016;
      --red: #E05858;
      --red-bg: #260E0E;
      --blue: #6BA3E8;
      --blue-bg: #0A1C32;
      --amber: #E0A840;
      --amber-bg: #201608;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); font-family: var(--sans); color: var(--text); }

  /* ── Layout ── */
  #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

  /* ── Header ── */
  header {
    display: flex; align-items: center;
    height: var(--header-h);
    padding: 0 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    gap: 10px;
    flex-shrink: 0;
  }
  .logo { display: flex; align-items: center; gap: 9px; }
  .logo-icon {
    width: 28px; height: 28px;
    background: var(--accent);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo-icon svg { width: 15px; height: 15px; fill: white; }
  .logo-name { font-size: 15px; font-weight: 600; letter-spacing: -0.4px; line-height: 1; }
  .logo-name span { color: var(--accent); }
  .logo-badge {
    font-size: 9px; font-weight: 600; letter-spacing: 0.4px;
    background: var(--accent-light); color: var(--accent-text);
    padding: 2px 6px; border-radius: 100px;
    text-transform: uppercase;
  }
  .header-spacer { flex: 1; }
  .header-actions { display: flex; gap: 5px; }
  .icon-btn {
    width: 32px; height: 32px;
    border: 1px solid var(--border-md);
    border-radius: var(--radius-xs);
    background: transparent;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--text3);
    transition: background 0.12s, color 0.12s, border-color 0.12s;
  }
  .icon-btn:hover { background: var(--surface2); color: var(--text2); border-color: var(--border-md); }
  .icon-btn:active { background: var(--surface3); transform: scale(0.95); }
  .icon-btn svg { width: 15px; height: 15px; }

  /* ── Tabs ── */
  #tab-bar {
    display: flex;
    height: var(--tabbar-h);
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 0 10px;
    gap: 1px;
    overflow-x: auto;
    scrollbar-width: none;
    flex-shrink: 0;
    align-items: stretch;
  }
  #tab-bar::-webkit-scrollbar { display: none; }
  .tab {
    display: flex; align-items: center; gap: 5px;
    padding: 0 10px;
    font-size: 11.5px; font-weight: 500;
    color: var(--text3);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: color 0.12s, border-color 0.12s, background 0.12s;
    border-radius: var(--radius-xs) var(--radius-xs) 0 0;
    margin-top: 4px;
  }
  .tab:hover { color: var(--text2); background: rgba(0,0,0,0.03); }
  @media (prefers-color-scheme: dark) { .tab:hover { background: rgba(255,255,255,0.04); } }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    background: var(--surface);
  }
  .tab-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--text3); flex-shrink: 0;
    transition: background 0.12s;
  }
  .tab.active .tab-dot { background: var(--accent); }
  .tab-name { max-width: 90px; overflow: hidden; text-overflow: ellipsis; }
  .tab-close {
    width: 16px; height: 16px; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: var(--text3);
    margin-left: 1px; flex-shrink: 0;
    transition: background 0.12s, color 0.12s;
  }
  .tab-close:hover { background: var(--surface3); color: var(--text); }
  .tab-add {
    display: flex; align-items: center; padding: 0 8px;
    color: var(--text3); cursor: pointer; font-size: 16px; font-weight: 400;
    transition: color 0.12s;
  }
  .tab-add:hover { color: var(--accent); }

  /* ── Editor area ── */
  #main { flex: 1; display: flex; flex-direction: column; min-height: 0; }

  /* ── Toolbar ── */
  #toolbar {
    display: flex; align-items: center; gap: 5px;
    height: var(--toolbar-h);
    padding: 0 10px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  #toolbar::-webkit-scrollbar { display: none; }
  .run-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 0 16px;
    height: 34px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    font-family: var(--sans);
    font-size: 13px; font-weight: 600;
    cursor: pointer;
    transition: filter 0.12s, transform 0.1s;
    letter-spacing: 0.1px;
    flex-shrink: 0;
  }
  .run-btn:hover { filter: brightness(1.08); }
  .run-btn:active { filter: brightness(0.92); transform: scale(0.97); }
  .run-btn.loading { opacity: 0.65; pointer-events: none; }
  .run-btn svg { width: 12px; height: 12px; fill: white; flex-shrink: 0; }
  .toolbar-spacer { flex: 1; min-width: 4px; }
  .toolbar-divider { width: 1px; height: 18px; background: var(--border-md); flex-shrink: 0; margin: 0 2px; }
  .status-pill {
    display: flex; align-items: center; gap: 5px;
    font-size: 10.5px; font-weight: 600;
    padding: 4px 9px;
    border-radius: 100px;
    background: var(--surface2);
    color: var(--text3);
    transition: background 0.25s, color 0.25s;
    flex-shrink: 0;
    letter-spacing: 0.2px;
  }
  .status-pill.ready { background: var(--green-bg); color: var(--green); }
  .status-pill.loading { background: var(--blue-bg); color: var(--blue); }
  .status-pill.error { background: var(--red-bg); color: var(--red); }
  .status-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: currentColor; flex-shrink: 0;
  }
  .status-dot.pulse { animation: pulse 1.3s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .toolbar-icon-btn {
    width: 32px; height: 32px;
    border-radius: var(--radius-xs);
    border: 1px solid var(--border-md);
    background: transparent;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--text3);
    transition: background 0.12s, color 0.12s;
    flex-shrink: 0;
  }
  .toolbar-icon-btn:hover { background: var(--surface2); color: var(--text2); }
  .toolbar-icon-btn:active { background: var(--surface3); transform: scale(0.94); }
  .toolbar-icon-btn svg { width: 13px; height: 13px; }
  .toolbar-key-btn {
    height: 32px; padding: 0 8px;
    border-radius: var(--radius-xs);
    border: 1px solid var(--border-md);
    background: transparent;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--text2);
    font-family: var(--mono); font-size: 12px; font-weight: 500;
    transition: background 0.12s, color 0.12s;
    flex-shrink: 0;
    letter-spacing: 0.5px;
  }
  .toolbar-key-btn:hover { background: var(--surface2); }
  .toolbar-key-btn:active { background: var(--surface3); transform: scale(0.94); }

  /* ── Split panel ── */
  #editor-panel { flex: 1; display: flex; flex-direction: column; min-height: 0; position: relative; }
  #resizer {
    height: 6px; background: var(--border); cursor: row-resize; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
    position: relative;
  }
  #resizer:hover, #resizer.dragging { background: var(--accent-light); }
  #resizer::after {
    content: ''; width: 36px; height: 3px;
    border-radius: 2px; background: var(--border-md);
    transition: background 0.15s;
  }
  #resizer:hover::after, #resizer.dragging::after { background: var(--accent); }

  /* ── Code editor ── */
  #code-wrap {
    flex: 1; min-height: 120px; overflow: hidden;
    display: flex; flex-direction: row; position: relative;
    background: var(--surface);
  }
  #line-numbers {
    flex-shrink: 0; width: 44px;
    padding: 14px 8px 14px 0;
    font-family: var(--mono); font-size: 13px; line-height: 1.8;
    text-align: right; color: var(--text3);
    background: var(--surface2);
    border-right: 1px solid var(--border);
    user-select: none; pointer-events: none;
    overflow: hidden; white-space: pre;
  }
  #highlight-wrap {
    flex: 1; position: relative; overflow: hidden;
    display: flex;
  }
  #highlight-pre, #editor {
    position: absolute; inset: 0;
    margin: 0; padding: 14px 14px 60px 14px;
    font-family: var(--mono); font-size: 13px; line-height: 1.8;
    tab-size: 4; -moz-tab-size: 4;
    white-space: pre; overflow-wrap: normal;
    word-wrap: normal;
  }
  #highlight-pre {
    background: transparent; border: none;
    overflow: hidden; pointer-events: none;
    z-index: 1; color: transparent; 
  }
  #highlight-code {
    font-family: inherit; font-size: inherit;
    line-height: inherit; display: block;
    background: none !important;
  }
  
  /* [修复2] 彻底隐藏 textarea 的系统自带滚动条带来的物理体积挤压错位 */
  #editor::-webkit-scrollbar { display: none; }
  #editor {
    background: transparent; border: none; outline: none;
    resize: none; z-index: 2;
    overflow: auto;
    -webkit-overflow-scrolling: touch;
    color: transparent;
    caret-color: var(--accent);
    -webkit-text-fill-color: transparent;
    scrollbar-width: none;
  }
  #editor::selection { background: rgba(201,107,58,0.2); -webkit-text-fill-color: transparent; }

  /*[修复1] 移除粗体(font-weight: 600)与斜体(italic)，防止因等宽字体字重导致物理尺寸变化引发严重横向错位 */
  #highlight-code .token.comment, #highlight-code .token.prolog { color: #9A9890; }
  #highlight-code .token.keyword { color: #B85A28; }
  #highlight-code .token.builtin { color: #1A5CA8; }
  #highlight-code .token.string, #highlight-code .token.string-interpolation { color: #2A7A4A; }
  #highlight-code .token.number { color: #1A5CA8; }
  #highlight-code .token.operator { color: #5A5750; }
  #highlight-code .token.punctuation { color: #8A8680; }
  #highlight-code .token.function { color: #7B3F00; }
  #highlight-code .token.class-name { color: #7B3F00; }
  #highlight-code .token.decorator { color: #9A6A10; }
  #highlight-code .token.boolean, #highlight-code .token.constant { color: #B85A28; }
  #highlight-code .token.important { color: #B02828; }
  #highlight-code { color: #1C1A17; }

  @media (prefers-color-scheme: dark) {
    #highlight-code .token.comment, #highlight-code .token.prolog { color: #555250; }
    #highlight-code .token.keyword { color: #E07840; }
    #highlight-code .token.builtin { color: #6BA3E8; }
    #highlight-code .token.string, #highlight-code .token.string-interpolation { color: #4AAF72; }
    #highlight-code .token.number { color: #6BA3E8; }
    #highlight-code .token.operator { color: #8A8780; }
    #highlight-code .token.punctuation { color: #555250; }
    #highlight-code .token.function { color: #E0A840; }
    #highlight-code .token.class-name { color: #E0A840; }
    #highlight-code .token.decorator { color: #E0A840; }
    #highlight-code .token.boolean, #highlight-code .token.constant { color: #E07840; }
    #highlight-code .token.important { color: #E06060; }
    #highlight-code { color: #EEEAE4; }
  }

  /* [修复4] 移除 display:block 与 margin，采用纯行内圆角背景，彻底根除运行排版被挤乱的问题 */
  .editor-error-line {
    background: rgba(176, 40, 40, 0.2);
    border-radius: 3px;
    padding: 1px 2px;
  }

  /* ── Output panel ── */
  #output-panel {
    height: 240px; min-height: 80px; max-height: 72vh;
    display: flex; flex-direction: column;
    background: var(--surface);
    border-top: 2px solid var(--border);
  }
  #output-header {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    flex-shrink: 0;
    min-height: 36px;
  }
  #output-title {
    font-size: 10px; font-weight: 700; color: var(--text3);
    text-transform: uppercase; letter-spacing: 1px;
  }
  .output-spacer { flex: 1; }
  .output-action-btn {
    display: flex; align-items: center; gap: 4px;
    font-size: 11px; font-weight: 500; color: var(--text3);
    cursor: pointer; padding: 4px 8px;
    border-radius: var(--radius-xs);
    transition: background 0.12s, color 0.12s;
    border: 1px solid transparent;
  }
  .output-action-btn:hover { background: var(--surface3); color: var(--text2); border-color: var(--border); }
  .output-action-btn svg { width: 11px; height: 11px; }
  #output-scroll {
    flex: 1; overflow-y: auto; overflow-x: auto; padding: 12px 14px;
    scrollbar-width: thin; scrollbar-color: var(--border-md) transparent;
    -webkit-overflow-scrolling: touch;
  }
  #output-scroll::-webkit-scrollbar { width: 3px; }
  #output-scroll::-webkit-scrollbar-track { background: transparent; }
  #output-scroll::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 2px; }
  #output-content {
    font-family: var(--mono); font-size: 12.5px; line-height: 1.75;
    white-space: pre-wrap; word-break: break-all;
    color: var(--text);
  }
  .out-line { display: block; }
  .out-line.stderr { color: var(--red); }
  .out-line.success { color: var(--green); }
  .out-line.info { color: var(--text3); font-style: italic; }
  .out-line.image-out { margin: 10px 0; }
  .out-line.image-out img { max-width: 100%; border-radius: var(--radius-sm); border: 1px solid var(--border); }

  /* ── Placeholder ── */
  .output-placeholder {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; gap: 10px;
  }
  .output-placeholder-icon {
    width: 40px; height: 40px; border-radius: 12px;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
  }
  .output-placeholder-icon svg { width: 20px; height: 20px; color: var(--text3); }
  .output-placeholder p { font-size: 12px; color: var(--text3); }

  /* ── Bottom sheet drawer (shared) ── */
  .sheet-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    display: none; z-index: 100; align-items: flex-end;
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
  }
  .sheet-overlay.open { display: flex; }
  .sheet {
    width: 100%; background: var(--surface);
    border-radius: var(--radius) var(--radius) 0 0;
    display: flex; flex-direction: column;
    animation: slideUp 0.22s cubic-bezier(0.32,0.72,0,1);
    padding-bottom: env(safe-area-inset-bottom);
    box-shadow: 0 -4px 32px rgba(0,0,0,0.12);
  }
  @keyframes slideUp { from { transform: translateY(100%); opacity: 0.5; } to { transform: translateY(0); opacity: 1; } }
  .sheet-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--border-md); margin: 10px auto 2px; }
  .sheet-header { display: flex; align-items: center; padding: 10px 16px 8px; gap: 10px; }
  .sheet-title { font-size: 15px; font-weight: 600; flex: 1; letter-spacing: -0.2px; }

  /* ── Snippets ── */
  #snippets-drawer { max-height: 78vh; }
  #snippets-list { overflow-y: auto; padding: 4px 10px 16px; flex: 1; }
  .snippet-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 8px;
    border-radius: 10px;
    cursor: pointer; transition: background 0.12s;
  }
  .snippet-item:hover { background: var(--surface2); }
  .snippet-item:active { background: var(--surface3); transform: scale(0.99); }
  .snippet-icon {
    width: 38px; height: 38px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 19px; flex-shrink: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
  }
  .snippet-text { flex: 1; min-width: 0; }
  .snippet-text .snippet-name { font-size: 13px; font-weight: 600; }
  .snippet-text .snippet-desc { font-size: 11.5px; color: var(--text3); margin-top: 1px; }
  .snippet-arrow { color: var(--text3); font-size: 16px; }

  /* ── Settings ── */
  #settings-drawer { max-height: 68vh; }
  #settings-body { overflow-y: auto; padding: 4px 16px 16px; flex: 1; }
  .setting-section-title {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.8px; color: var(--text3);
    padding: 12px 0 6px;
  }
  .setting-row {
    display: flex; align-items: center; padding: 11px 0;
    border-bottom: 1px solid var(--border); gap: 12px;
  }
  .setting-row:last-child { border-bottom: none; }
  .setting-label { flex: 1; }
  .setting-label p { font-size: 13px; font-weight: 500; }
  .setting-label span { font-size: 11.5px; color: var(--text3); margin-top: 1px; display: block; }
  select.setting-select {
    background: var(--surface2); border: 1px solid var(--border-md);
    color: var(--text); font-family: var(--sans); font-size: 12px;
    padding: 6px 10px; border-radius: var(--radius-sm); outline: none;
    cursor: pointer;
  }
  .toggle {
    width: 42px; height: 24px; border-radius: 100px;
    background: var(--surface3); border: 1px solid var(--border-md);
    position: relative; cursor: pointer; transition: background 0.2s, border-color 0.2s;
    flex-shrink: 0;
  }
  .toggle.on { background: var(--accent); border-color: var(--accent); }
  .toggle::after {
    content: ''; position: absolute;
    width: 18px; height: 18px; border-radius: 50%;
    background: white; top: 2px; left: 2px;
    transition: transform 0.2s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 0 1px 4px rgba(0,0,0,0.25);
  }
  .toggle.on::after { transform: translateX(18px); }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: calc(var(--toolbar-h) + 12px); left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text); color: var(--bg);
    padding: 9px 16px; border-radius: 100px;
    font-size: 12.5px; font-weight: 500;
    z-index: 400; transition: transform 0.25s cubic-bezier(0.32,0.72,0,1), opacity 0.25s;
    white-space: nowrap; opacity: 0;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18);
    pointer-events: none;
  }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* ── Loading overlay ── */
  #loading-overlay {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 500; gap: 0;
    transition: opacity 0.4s;
  }
  .loader-icon {
    width: 56px; height: 56px; border-radius: 14px;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 20px;
    box-shadow: 0 8px 24px rgba(201,107,58,0.3);
  }
  .loader-icon svg { width: 28px; height: 28px; fill: white; }
  .loader-logo { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; margin-bottom: 6px; }
  .loader-logo span { color: var(--accent); }
  .loader-subtitle { font-size: 12px; color: var(--text3); margin-bottom: 28px; }
  .loader-bar {
    width: 140px; height: 2px; background: var(--border);
    border-radius: 2px; overflow: hidden; margin-bottom: 12px;
  }
  .loader-fill {
    height: 100%; background: var(--accent); border-radius: 2px;
    width: 0%; transition: width 0.4s ease;
  }
  .loader-text { font-size: 11.5px; color: var(--text3); text-align: center; max-width: 220px; line-height: 1.5; }

  /* ── Input prompt ── */
  #stdin-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    display: none; align-items: flex-end; justify-content: center;
    z-index: 150;
    backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
  }
  #stdin-overlay.open { display: flex; }
  #stdin-box {
    background: var(--surface);
    border-radius: var(--radius) var(--radius) 0 0;
    padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
    width: 100%; max-width: 480px;
    animation: slideUp 0.22s cubic-bezier(0.32,0.72,0,1);
  }
  #stdin-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.8px; color: var(--text3); margin-bottom: 8px;
  }
  #stdin-prompt {
    font-size: 13px; color: var(--text); margin-bottom: 12px;
    font-family: var(--mono); background: var(--surface2);
    padding: 8px 12px; border-radius: var(--radius-xs);
    border-left: 3px solid var(--accent);
    min-height: 36px; word-break: break-all;
  }
  #stdin-input {
    width: 100%; padding: 11px 12px;
    border: 1.5px solid var(--border-md); border-radius: var(--radius-sm);
    background: var(--surface2); color: var(--text);
    font-family: var(--mono); font-size: 13px; outline: none;
    transition: border-color 0.15s;
  }
  #stdin-input:focus { border-color: var(--accent); }
  #stdin-submit {
    margin-top: 10px; width: 100%; padding: 12px;
    background: var(--accent); color: white; border: none;
    border-radius: var(--radius-sm); font-family: var(--sans);
    font-size: 13px; font-weight: 600; cursor: pointer;
    transition: filter 0.12s;
  }
  #stdin-submit:hover { filter: brightness(1.08); }
  #stdin-submit:active { filter: brightness(0.92); }
</style>
</head>
<body>

  </div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ── State ──
let pyodide = null;
let activeTab = 0;
let isRunning = false;
let inputResolve = null;
const _defSettings = { autoIndent: true, clearBeforeRun: true, showLines: true, fontSize: 13 };
let settings = (() => {
  try { return Object.assign({}, _defSettings, JSON.parse(localStorage.getItem('pyrunner_settings') || '{}')); }
  catch(_) { return { ..._defSettings }; }
})();
function saveSettings() {
  try { localStorage.setItem('pyrunner_settings', JSON.stringify(settings)); } catch(_) {}
}

// ── 持久化（localStorage）──
function saveState() {
  try {
    const _ed = document.getElementById('editor'); if(_ed) tabs[activeTab].code = _ed.value;
    localStorage.setItem('pyrunner_tabs', JSON.stringify(tabs));
    localStorage.setItem('pyrunner_active', activeTab);
  } catch(_) {}
}
function loadState() {
  try {
    const saved = localStorage.getItem('pyrunner_tabs');
    if (saved) return { tabs: JSON.parse(saved), active: parseInt(localStorage.getItem('pyrunner_active')||'0') };
  } catch(_) {}
  return null;
}
const _savedState = loadState();
let tabs = _savedState ? _savedState.tabs :[{ name: 'main.py', code: _INITIAL_CODE }];
if (_savedState) {
  activeTab = Math.min(_savedState.active, tabs.length - 1);
}
setInterval(saveState, 3000);

// ── Pyodide init ──
async function initPyodide() {
  const _initCode = (tabs && tabs[activeTab]) ? tabs[activeTab].code : (_INITIAL_CODE || '');
  initEditor(_initCode);
  try {
    const setLoadMsg = (m, pct) => { 
      const el = document.getElementById('loader-text'); 
      if(el) el.textContent = m; 
      if(pct !== undefined) {
        const f = document.getElementById('loader-fill');
        if(f) f.style.width = pct + '%';
      } 
    };

    setLoadMsg('正在建立与 Python 的连接...', 5);
    let fakePct = 5;
    const fakeInterval = setInterval(() => {
      if (fakePct < 35) {
        fakePct += 1.5;
        setLoadMsg('正在下载核心编译环境...', fakePct);
      }
    }, 250);

    pyodide = await loadPyodide({ indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.25.0/full/' });
    clearInterval(fakeInterval);

    const pkgGroups =[
      { label: '加载数值计算库 (numpy, scipy)...', pkgs:['numpy', 'scipy', 'micropip'], pct: 45 },
      { label: '加载数据分析库 (pandas, statsmodels)...', pkgs:['pandas', 'statsmodels'], pct: 55 },
      { label: '加载可视化库 (matplotlib, Pillow)...', pkgs: ['matplotlib', 'Pillow'], pct: 65 },
      { label: '加载机器学习库 (sklearn, sympy)...', pkgs:['scikit-learn', 'sympy'], pct: 75 },
      { label: '加载网络架构库 (networkx)...', pkgs: ['networkx', 'pyodide-http'], pct: 80 },
    ];
    for (const g of pkgGroups) {
      setLoadMsg(g.label, g.pct);
      await pyodide.loadPackage(g.pkgs);
    }

    setLoadMsg('安装高级扩展图表库 (seaborn, plotly)...', 85);
    try {
      await pyodide.runPythonAsync("import micropip; await micropip.install(['seaborn', 'plotly'])");
    } catch(_) {}

    setLoadMsg('正在加载中文字体，让图表更清晰...', 92);
    try {
      const fontUrl = 'https://cdn.jsdelivr.net/gh/googlefonts/noto-cjk@main/Sans/OTF/SimplifiedChinese/NotoSansCJKsc-Regular.otf';
      const fontResp = await fetch(fontUrl);
      if (!fontResp.ok) throw new Error('font fetch ' + fontResp.status);
      const fontBytes = new Uint8Array(await fontResp.arrayBuffer());
      pyodide.FS.writeFile('/tmp/NotoSansSC.otf', fontBytes);
      pyodide.runPython(`
import matplotlib.font_manager as fm, matplotlib as mpl
fe = fm.FontEntry(fname='/tmp/NotoSansSC.otf', name='Noto Sans SC')
fm.fontManager.ttflist.insert(0, fe)
mpl.rcParams['font.family'] = 'Noto Sans SC'
mpl.rcParams['axes.unicode_minus'] = False
`);
      showToast('Python 3.11 已就绪，中文字体已加载 ✓');
    } catch(fontErr) {
      console.warn('中文字体加载失败，降级:', fontErr);
      pyodide.runPython(`
import matplotlib as mpl
mpl.rcParams['axes.unicode_minus'] = False
`);
      showToast('Python 3.11 已就绪（中文字体加载失败）');
    }

    setLoadMsg('一切就绪，开始探索数学与代码的美妙吧！', 100);
    setStatus('ready', '就绪');
    document.getElementById('run-btn').classList.remove('loading');
    setTimeout(() => {
      document.getElementById('loading-overlay').style.opacity = '0';
      setTimeout(() => { document.getElementById('loading-overlay').style.display = 'none'; }, 400);
    }, 300);
  } catch(e) {
    setStatus('error', '加载失败');
    appendOutput('⚠ Pyodide 加载失败，请检查网络连接\n' + e, 'stderr');
    document.getElementById('loading-overlay').style.display = 'none';
  }
}

// ── Run / Stop ──
let _stopRequested = false;
function toggleRun() { if (isRunning) { _stopRequested = true; } else { runCode(); } }
function setRunBtn(running) {
  const btn = document.getElementById('run-btn');
  const icon = document.getElementById('run-icon');
  const label = document.getElementById('run-label');
  if (running) {
    btn.classList.remove('loading');
    icon.innerHTML = '<rect x="6" y="6" width="12" height="12" rx="2"/>';
    label.textContent = '停止';
    btn.style.background = 'var(--red)';
  } else {
    icon.innerHTML = '<path d="M8 5v14l11-7z"/>';
    label.textContent = '运行';
    btn.style.background = '';
  }
}

async function runCode() {
  if (!pyodide || isRunning) return;
  const code = document.getElementById('editor') ? document.getElementById('editor').value : '';
  if (!code.trim()) { showToast('请输入代码'); return; }
  isRunning = true;
  _stopRequested = false;
  setRunBtn(true);
  setStatus('loading', '运行中');
  if (settings.clearBeforeRun) clearOutput();

  const t0 = performance.now();
  let outputEl = document.getElementById('output-content');

  if (!window._captureInstalled) {
    window._captureInstalled = true;
    pyodide.runPython(`
import sys, io
class _Capture(io.TextIOBase):
    def __init__(self, kind):
        self.kind = kind
    def write(self, s):
        import js
        js._pyrunner_write(self.kind, s)
        return len(s)
    def flush(self): pass
sys.stdout = _Capture('stdout')
sys.stderr = _Capture('stderr')
`);
    window._pyrunner_write = (kind, s) => appendOutput(s, kind === 'stderr' ? 'stderr' : null);
  }

  if (!window._inputInstalled) {
    window._inputInstalled = true;
    pyodide.runPython(`
import builtins
_orig_input = builtins.input
def _custom_input(prompt=""):
    import js
    return js._pyrunner_input(str(prompt))
builtins.input = _custom_input
`);
  }
  window._pyrunner_input = (prompt) => {
    return new Promise(resolve => {
      document.getElementById('stdin-prompt').textContent = prompt || '请输入：';
      document.getElementById('stdin-input').value = '';
      document.getElementById('stdin-overlay').classList.add('open');
      document.getElementById('stdin-input').focus();
      inputResolve = resolve;
    });
  };
  document.getElementById('stdin-submit').onclick = () => {
    const val = document.getElementById('stdin-input').value;
    document.getElementById('stdin-overlay').classList.remove('open');
    if (inputResolve) { inputResolve(val); inputResolve = null; }
  };
  document.getElementById('stdin-input').onkeydown = (e) => {
    if (e.key === 'Enter') document.getElementById('stdin-submit').click();
  };

  try {
    const importLines = code.match(/^\s*(?:import|from)\s+([a-zA-Z_][a-zA-Z0-9_]*)/gm) ||[];
    const pkgSet = new Set();
    importLines.forEach(line => {
      const m = line.match(/^\s*(?:import|from)\s+([a-zA-Z_][a-zA-Z0-9_]*)/);
      if (m) pkgSet.add(m[1]);
    });
    const builtins = new Set([
      'sys','os','io','re','math','time','json','random','datetime','collections',
      'itertools','functools','pathlib','string','struct','hashlib','base64',
      'copy','types','abc','enum','typing','dataclasses','contextlib','warnings',
      'traceback','inspect','gc','weakref','threading','queue','subprocess',

// ── Output helpers ──
let _outputRaf = null;

function appendOutput(text, cls) {
  const el = document.getElementById('output-content');
  const ph = el.querySelector('.output-placeholder');
  if (ph) ph.remove();
  const parts = text.split('\n');
  parts.forEach((part, i) => {
    const isLast = i === parts.length - 1;
    if (isLast && part === '') return;
    const prev = el.lastChild;
    if (i === 0 && prev && prev._lineOpen && prev._cls === (cls||'')) {
      prev.textContent += part;
      if (!isLast) { prev.textContent += '\n'; prev._lineOpen = false; }
    } else {
      const span = document.createElement('span');
      span.className = 'out-line' + (cls ? ' ' + cls : '');
      span.textContent = part + (!isLast ? '\n' : '');
      span._cls = cls || '';
      span._lineOpen = isLast;
      el.appendChild(span);
    }
  });
  scrollOutput();
  trimOutputIfNeeded();
}

function clearOutput() {
  document.getElementById('output-content').innerHTML = '';
  const lc = document.getElementById('output-linecount'); if(lc) lc.textContent='';
}

const MAX_OUTPUT_LINES = 2000;
function trimOutputIfNeeded() {
  const el = document.getElementById('output-content');
  const spans = el.querySelectorAll('.out-line');
  if (spans.length > MAX_OUTPUT_LINES) {
    const notice = document.createElement('span');
    notice.className = 'out-line info';
    notice.textContent = `… 输出过多，已截断至最新 ${MAX_OUTPUT_LINES} 行 …\n`;
    for (let i = 0; i < spans.length - MAX_OUTPUT_LINES; i++) spans[i].remove();
    el.insertBefore(notice, el.firstChild);
  }
}

function scrollOutput() {
  const s = document.getElementById('output-scroll');
  if (_outputRaf) return;
  _outputRaf = requestAnimationFrame(() => {
    s.scrollTop = s.scrollHeight; _outputRaf = null;
    const lc = document.getElementById('output-linecount');
    if (lc) { const n = document.getElementById('output-content').querySelectorAll('.out-line').length; lc.textContent = n > 0 ? n + ' 行' : ''; }
  });
}

// ── 语法高亮（Prism.js）──
let _highlightRaf = null;
function highlightCode() {
  if (_highlightRaf) return;
  _highlightRaf = requestAnimationFrame(() => {
    _highlightRaf = null;
    const ed = document.getElementById('editor');
    const code = document.getElementById('highlight-code');
    if (!ed || !code) return;
    
    const raw = ed.value;
    let html = '';
    if (typeof Prism !== 'undefined') {
      html = Prism.highlight(raw, Prism.languages.python, 'python');
    } else {
      // Prism未加载时的转义回退
      html = raw.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    
    // [修复3] 防止浏览器吃掉末尾换行引发垂直错位，附加零宽空格撑起最后一行
    if (raw.endsWith('\n')) {
      html += '&#8203;';
    }
    code.innerHTML = html;

    // 同步 pre 的滚动位置
    const pre = document.getElementById('highlight-pre');
    if (pre) { pre.scrollTop = ed.scrollTop; pre.scrollLeft = ed.scrollLeft; }
    updateLineNumbers();
  });
}

// ── 行号 ──
function updateLineNumbers() {
  const ed = document.getElementById('editor');
  const ln = document.getElementById('line-numbers');
  if (!ed || !ln) return;
  const lineCount = (ed.value.match(/\n/g) ||[]).length + 1;
  if (ln._lastCount === lineCount) return;
  ln._lastCount = lineCount;
  let s = '';
  for (let i = 1; i <= lineCount; i++) s += i + '\n';
  ln.textContent = s;
  ln.scrollTop = ed.scrollTop;
}

// ── 同步滚动 ──
function syncScroll() {
  const ed  = document.getElementById('editor');
  const pre = document.getElementById('highlight-pre');
  const ln  = document.getElementById('line-numbers');
  if (!ed || !pre) return;
  pre.scrollTop  = ed.scrollTop;
  pre.scrollLeft = ed.scrollLeft;
  if (ln) ln.scrollTop = ed.scrollTop;
}

// [防御] 避免窗口缩放或输入法拉起时打破同步
window.addEventListener('resize', syncScroll);

// ── 错误行高亮 ──
let _errLineNo = 0;
function highlightErrorLine(lineNo) {
  clearErrorHighlight();
  _errLineNo = lineNo;
  _renderErrorHighlight();
}
function _renderErrorHighlight() {
  if (!_errLineNo) return;
  const ed = document.getElementById('editor');
  const code = document.getElementById('highlight-code');
  if (!ed || !code || typeof Prism === 'undefined') return;
  const raw = ed.value;
  const lines = Prism.highlight(raw, Prism.languages.python, 'python').split('\n');
  if (_errLineNo >= 1 && _errLineNo <= lines.length) {
    lines[_errLineNo - 1] = '<span class="editor-error-line">' + (lines[_errLineNo - 1] || '\u00a0') + '</span>';
  }
  let finalHtml = lines.join('\n');
  
  // [修复3] 同样为错误高亮逻辑保持末尾换行保护
  if (raw.endsWith('\n')) finalHtml += '&#8203;';
  code.innerHTML = finalHtml;
  
  // 滚动到出错行
  const lineH = parseFloat(getComputedStyle(ed).lineHeight) || 22;
  ed.scrollTop = Math.max(0, (_errLineNo - 4) * lineH);
  syncScroll();
}
function clearErrorHighlight() {
  _errLineNo = 0;
  highlightCode();

// ── Editor helpers ──
function insertText(text) {
  const ed = document.getElementById('editor');
  if (!ed) return;
  const s = ed.selectionStart, e = ed.selectionEnd;
  ed.value = ed.value.substring(0, s) + text + ed.value.substring(e);
  const pairMap = { '()':1, '[]':1, '{}':1, '""':1, "''":1 };
  const cur = pairMap[text] ? s + 1 : s + text.length;
  ed.setSelectionRange(cur, cur);
  ed.focus();
  highlightCode();
  if (tabs[activeTab]) tabs[activeTab].code = ed.value;
}

function undoCode() {
  const ed = document.getElementById('editor');
  if (!ed) return;
  ed.focus();
  document.execCommand('undo');
  highlightCode();
}

// ── 初始化编辑器 ──
function initEditor(code) {
  const ed = document.getElementById('editor');
  if (!ed) return;
  ed.value = code || _INITIAL_CODE;

  // input: 高亮 + 同步 tabs
  ed.addEventListener('input', () => {
    if (tabs[activeTab]) tabs[activeTab].code = ed.value;
    highlightCode();
  });

  // scroll: 同步 pre + 行号
  ed.addEventListener('scroll', syncScroll);

  // keydown 处理
  ed.addEventListener('keydown', (e) => {
    const s = e.target.selectionStart, end = e.target.selectionEnd;

    // Ctrl/Cmd+Enter → 运行
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
      e.preventDefault(); toggleRun(); return;
    }

    // Tab / Shift+Tab
    if (e.key === 'Tab') {
      e.preventDefault();
      if (e.shiftKey) {
        const aLines = ed.value.split('\n');
        let pos=0, sl=0, el2=0;
        for(let i=0;i<aLines.length;i++){if(pos<=s)sl=i;if(pos<=end)el2=i;pos+=aLines[i].length+1;}
        let remS=0,remTotal=0;
        for(let i=sl;i<=el2;i++){const o=aLines[i];aLines[i]=o.replace(/^ {1,4}/,'');const d=o.length-aLines[i].length;if(i===sl)remS=d;remTotal+=d;}
        ed.value=aLines.join('\n');
        ed.setSelectionRange(Math.max(0,s-remS),Math.max(0,end-remTotal));
      } else {
        ed.value = ed.value.substring(0,s)+'    '+ed.value.substring(end);
        ed.setSelectionRange(s+4, s+4);
      }
      if(tabs[activeTab]) tabs[activeTab].code = ed.value;
      highlightCode(); return;
    }

    // 括号 / 引号自动补全
    const pairs = {'(':')', '[':']', '{':'}', '"':'"', "'":"'"};
    if (pairs[e.key] && s === end) {
      e.preventDefault();
      ed.value = ed.value.substring(0,s) + e.key + pairs[e.key] + ed.value.substring(end);
      ed.setSelectionRange(s+1, s+1);
      if(tabs[activeTab]) tabs[activeTab].code = ed.value;
      highlightCode(); return;
    }
    // 右括号跳过
    if ([")", "]", "}"].includes(e.key) && ed.value[s] === e.key) {
      e.preventDefault(); ed.setSelectionRange(s+1, s+1); return;
    }
    // Backspace 删除成对
    if (e.key === 'Backspace' && s === end && s > 0) {
      const open = ed.value[s-1], close = ed.value[s];
      if (pairs[open] === close) {
        e.preventDefault();
        ed.value = ed.value.substring(0,s-1) + ed.value.substring(s+1);
        ed.setSelectionRange(s-1, s-1);
        if(tabs[activeTab]) tabs[activeTab].code = ed.value;
        highlightCode(); return;
      }
    }
    // Enter → 自动缩进
    if (e.key === 'Enter' && settings.autoIndent) {
      const lines = ed.value.substring(0,s).split('\n');
      const last = lines[lines.length-1];
      const indent = last.match(/^(\s*)/)[1];
      const extra = last.trimEnd().endsWith(':') ? '    ' : '';
      e.preventDefault();
      ed.value = ed.value.substring(0,s) + '\n' + indent + extra + ed.value.substring(end);
      const newPos = s + 1 + indent.length + extra.length;
      ed.setSelectionRange(newPos, newPos);
      if(tabs[activeTab]) tabs[activeTab].code = ed.value;
      highlightCode(); return;
    }
  });

  // 首次渲染
  highlightCode();
}

// ── Tabs ──
let tabCounter = 1;
function startRenameTab(idx, div) {
  const nameEl = div.querySelector('.tab-name'); if (!nameEl) return;
  const old = tabs[idx].name;
  const inp = document.createElement('input');
  inp.value = old;
  inp.style.cssText = 'width:80px;font-size:12px;font-family:var(--sans);font-weight:500;background:var(--surface3);border:1px solid var(--accent);border-radius:4px;padding:0 4px;color:var(--text);outline:none;';
  nameEl.replaceWith(inp); inp.focus(); inp.select();
  const commit = () => { const v = inp.value.trim()||old; tabs[idx].name = v.endsWith('.py')?v:v+'.py'; renderTabs(); saveState(); };
  inp.onblur = commit;
  inp.onkeydown = (e) => { if(e.key==='Enter'){e.preventDefault();inp.blur();} if(e.key==='Escape'){inp.value=old;inp.blur();} };
}
function addTab() {
  tabCounter++;
  tabs.push({ name: 'script' + tabCounter + '.py', code: '# 新文件\nprint("Hello, World!")\n' });
  switchTab(tabs.length - 1);
  renderTabs();
}

function switchTab(idx) {
  const _edT = document.getElementById('editor');
  if(_edT) tabs[activeTab].code = _edT.value;
  activeTab = idx;
  if(_edT){ _edT.value = tabs[idx].code || ''; highlightCode(); }
  renderTabs();
}

function removeTab(e, idx) {
  e.stopPropagation();
  if (tabs.length === 1) { showToast('至少保留一个标签页'); return; }
  tabs.splice(idx, 1);
  activeTab = Math.min(activeTab, tabs.length - 1);
  const _edR = document.getElementById('editor'); if(_edR){ _edR.value = tabs[activeTab].code || ''; highlightCode(); }
  renderTabs();
}

function renderTabs() {
  const bar = document.getElementById('tab-bar');
  bar.innerHTML = '';
  tabs.forEach((t, i) => {
    const div = document.createElement('div');
    div.className = 'tab' + (i === activeTab ? ' active' : '');
    div.innerHTML = `<span style="width:6px;height:6px;border-radius:50%;background:${i===activeTab?'var(--accent)':'var(--text3)'};display:inline-block;flex-shrink:0;margin-right:2px;"></span><span class="tab-name">${t.name}</span><span class="tab-close" onclick="removeTab(event,${i})">×</span>`;
    div.addEventListener('click', () => switchTab(i));
    div.addEventListener('dblclick', (ev) => { ev.stopPropagation(); startRenameTab(i, div); });
    bar.appendChild(div);
  });
  const add = document.createElement('div');
  add.className = 'tab-add';
  add.textContent = '+';
  add.onclick = addTab;
  bar.appendChild(add);
}
document.getElementById('add-tab-btn').onclick = addTab;

// ── Resizer ──
let resizing = false, startY = 0, startH = 0;
const resizer = document.getElementById('resizer');
const outputPanel = document.getElementById('output-panel');
resizer.addEventListener('pointerdown', (e) => {
  resizing = true; startY = e.clientY; startH = outputPanel.offsetHeight;
  resizer.classList.add('dragging');
  e.preventDefault();
});
window.addEventListener('pointermove', (e) => {
  if (!resizing) return;
  const delta = startY - e.clientY;
  const newH = Math.max(80, Math.min(window.innerHeight * 0.7, startH + delta));
  outputPanel.style.height = newH + 'px';
  syncScroll(); // 确保拖拽改变尺寸后重新对齐
});
window.addEventListener('pointerup', () => { resizing = false; resizer.classList.remove('dragging'); });

r=color, linewidth=1.8, ms=5)\n    ax2.semilogy(sizes, results[name], 'o-', label=name, color=color, linewidth=1.8, ms=5)\n\nfor ax, title in[(ax1, '核心对比次数（线性轴）'), (ax2, '核心对比次数（对数轴）')]:\n    ax.set_xlabel('数组大小 n', color='#aaa')\n    ax.set_ylabel('比较次数', color='#aaa')\n    ax.set_title(title, color='white')\n    ax.legend(facecolor='#1a1a2e', labelcolor='white', fontsize=8)\n\nplt.tight_layout()\nplt.show()\n\nprint("📊 规模 n=1000 时的最终比较次数：")\nfor name, _, _ in algos:\n    print(f"  {name:<18}: {results[name][-1]:>8,} 次")\n`

    code: `import networkx as nx\nimport matplotlib.pyplot as plt\n\n# 「六度分隔」假说：世界上任意两人之间，最多通过6个中间人就能相连。\n# Watts-Strogatz 小世界模型能精确再现这种结构。\n\n# 生成三种网络对比\nN = 60\nGs = {\n    '规则环形网络\\n(只能认识邻居)': nx.watts_strogatz_graph(N, 6, 0.0, seed=42),\n    '小世界网络\\n(极少量人随机结识远方朋友)': nx.watts_strogatz_graph(N, 6, 0.1, seed=42),\n    '完全随机网络\\n(全屏乱点谱)':  nx.watts_strogatz_graph(N, 6, 1.0, seed=42),\n}\n\nfig, axes = plt.subplots(1, 3, figsize=(13, 5))\nfig.patch.set_facecolor('#0d1117')\ncolors = ['#58a6ff', '#3fb950', '#ff6b6b']\n\nfor ax, (name, G), color in zip(axes, Gs.items(), colors):\n    ax.set_facecolor('#0d1117')\n    pos = nx.circular_layout(G)\n\n    # 计算网络指标\n    C = nx.average_clustering(G)\n    L = nx.average_shortest_path_length(G)\n\n    # 用度数映射节点大小\n    degrees = dict(G.degree())\n    node_sizes =[degrees[n] * 8 + 20 for n in G.nodes()]\n\n    nx.draw_networkx_edges(G, pos, ax=ax, alpha=0.15, edge_color='#444', width=0.5)\n    nx.draw_networkx_nodes(G, pos, ax=ax, node_size=node_sizes, node_color=color, alpha=0.85)\n    ax.set_title(name, color='white', fontsize=10, pad=10)\n    ax.text(0.5, -0.05, f'聚集度 C = {C:.3f}\\n相隔度 L = {L:.2f}', \n            transform=ax.transAxes, ha='center', color='#aaa', fontsize=9)\n    ax.axis('off')\n\nplt.tight_layout()\nplt.show()\n\nprint("🤯 小世界网络（中图）的奇妙之处：")\nprint("仅仅有 10% 的人结交了远方的朋友，就能让整个社交圈的平均相隔人数从极高骤降到极低！")\n`

function renderSnippets() {
  const list = document.getElementById('snippets-list');
  list.innerHTML = '';
  SNIPPETS.forEach(s => {
    const div = document.createElement('div');
    div.className = 'snippet-item';
    div.innerHTML = `<div class="snippet-icon">${s.icon}</div><div class="snippet-text"><div class="snippet-name">${s.name}</div><div class="snippet-desc">${s.desc}</div></div><span class="snippet-arrow">›</span>`;
    div.onclick = () => {
      tabs[activeTab].code = s.code;
      const _edS = document.getElementById('editor'); if(_edS){ _edS.value = s.code; highlightCode(); }
      closeSnippets();
      showToast('已加载: ' + s.name);
    };
    list.appendChild(div);
  });
}
renderSnippets();

function closeSnippets(e) {
  if (!e || e.target === document.getElementById('snippets-overlay')) {
    document.getElementById('snippets-overlay').classList.remove('open');
  }
}
function closeSettings(e) {
  if (!e || e.target === document.getElementById('settings-overlay')) {
    document.getElementById('settings-overlay').classList.remove('open');
  }
}
document.getElementById('snippet-btn').onclick = () => {
  document.getElementById('snippets-overlay').classList.add('open');
};
document.getElementById('settings-btn').onclick = () => {
  document.getElementById('settings-overlay').classList.add('open');
};

// ── Settings ──
function applyFontSize(v) {
  const sz = parseInt(v);
  const ed = document.getElementById('editor');
  const pre = document.getElementById('highlight-pre');
  const ln = document.getElementById('line-numbers');
  const hc = document.getElementById('highlight-code');[ed, pre, ln, hc].forEach(el => { if(el) el.style.fontSize = sz + 'px'; });
  settings.fontSize = sz; saveSettings();
}
function toggleSetting(key) {
  const map = { 'auto-indent': 'autoIndent', 'clear-before-run': 'clearBeforeRun', 'show-lines': 'showLines' };
  const k = map[key];
  settings[k] = !settings[k];
  saveSettings();
  document.getElementById(key + '-toggle').classList.toggle('on', settings[k]);
  if (key === 'show-lines') {
    const _ln = document.getElementById('line-numbers');
    if (_ln) _ln.style.display = settings.showLines ? '' : 'none';
  }
}

// ── Toast ──
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── 复制工具（兼容 file:// 和浏览器环境）──
async function smartCopy(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    try { await navigator.clipboard.writeText(text); return true; } catch (_) {}
  }
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  let ok = false;
  try { ok = document.execCommand('copy'); } catch (_) {}
  document.body.removeChild(ta);
  return ok;
}

function flashCopyBtn(id) {
  const btn = document.getElementById(id);
  if (!btn) return;
  const orig = btn.innerHTML;
  btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:14px;height:14px"><path d="M20 6L9 17l-5-5"/></svg>';
  btn.style.color = 'var(--green)';
  setTimeout(() => { btn.innerHTML = orig; btn.style.color = ''; }, 1400);
}

async function copyOutput() {
  const text = document.getElementById('output-content').textContent.trim();
  if (!text) { showToast('输出为空'); return; }
  const ok = await smartCopy(text);
  if (ok) { flashCopyBtn('copy-output-btn'); showToast('已复制输出内容 \u2713'); }
  else showToast('复制失败，请手动选择文本');
}

function clearEditor() {
  const _edCl = document.getElementById('editor'); if (!_edCl || !_edCl.value.trim()) return;
  const btn = document.getElementById('clear-editor-btn');
  if (btn._confirmPending) {
    clearTimeout(btn._confirmTimer);
    btn._confirmPending = false;
    btn.style.color = '';
    btn.title = '清空编辑器';
    tabs[activeTab].code = '';
    const _edC = document.getElementById('editor'); if(_edC){ _edC.value = ''; highlightCode(); }
    clearErrorHighlight();
    saveState();
    showToast('已清空');
  } else {
    btn._confirmPending = true;
    btn.style.color = 'var(--red)';
    btn.title = '再次点击确认清空';
    showToast('再次点击确认清空');
    btn._confirmTimer = setTimeout(() => {
      btn._confirmPending = false;
      btn.style.color = '';
      btn.title = '清空编辑器';
    }, 2500);
  }
}

async function copyCode() {
  const text = (document.getElementById('editor') || {}).value || '';
  if (!text.trim()) { showToast('代码为空'); return; }
  const ok = await smartCopy(text);
  if (ok) { flashCopyBtn('copy-code-btn'); showToast('已复制代码 \u2713'); }
  else showToast('复制失败，请手动选择文本');
}

// ── 应用已保存的设置 ──
(function() {
  applyFontSize(settings.fontSize || 13);
  document.getElementById('font-size-select').value = settings.fontSize || 13;
  if (!settings.showLines) {
    const _ln2 = document.getElementById('line-numbers');
    if(_ln2) _ln2.style.display = 'none';
    document.getElementById('show-lines-toggle').classList.remove('on');
  }
  if (!settings.autoIndent) document.getElementById('auto-indent-toggle').classList.remove('on');
  if (!settings.clearBeforeRun) document.getElementById('clear-before-run-toggle').classList.remove('on');
})();

// ── Start ──
initPyodide();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(r => console.log('[SW] registered:', r.scope))
      .catch(e => console.warn('[SW] register failed:', e));
  });
}
let _deferredPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  _deferredPrompt = e;
  const btn = document.getElementById('pwa-install-btn');
  if (btn) btn.style.display = 'flex';
});
window.addEventListener('appinstalled', () => {
  _deferredPrompt = null;
  const btn = document.getElementById('pwa-install-btn');
  if (btn) btn.style.display = 'none';
  showToast('✓ PyRunner 已安装到桌面');
});
function installPWA() {
  if (!_deferredPrompt) { showToast('请使用浏览器菜单中的「安装」或「添加到主屏幕」'); return; }
  _deferredPrompt.prompt();
  _deferredPrompt.userChoice.then(() => {
    _deferredPrompt = null;
    const btn = document.getElementById('pwa-install-btn');
    if (btn) btn.style.display = 'none';
  });
}
</script>
