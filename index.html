<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PyRunner — Python 运行平台</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#C96B3A" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#E07840" media="(prefers-color-scheme: dark)">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PyRunner">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<link rel="icon" type="image/png" href="./favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js"></script>
<link rel="stylesheet" href="./styles/main.css">
</head>
<body>

<!-- Loading overlay -->
<div id="loading-overlay">
  <div class="loader-wordmark">
    <div class="loader-wordmark-icon">
      <svg viewBox="0 0 24 24" fill="white"><path d="M9.585 11.692H14.4v-3.23C14.4 5.1 12.55 3 9.585 3 6.87 3 5 4.92 5 7.462v1.015h3.23V7.4c0-.842.355-1.4 1.355-1.4s1.3.616 1.3 1.4v1.292H5v5.769c0 2.577 1.87 4.539 4.585 4.539H11v-2.308H9.585c-1 0-1.355-.615-1.355-1.461v-2h1.355zm5.1-3.692h2.73v2H14.685zm0 3.692v2h-2.73V11.7h2.73zm3.73-3.692v2h-1v3.692h1v2h-1c-2.73 0-4.415-1.962-4.415-4.539v-.385h1.685V9.97h-.73V7.97h4.46v.03z"/></svg>
    </div>
    <div class="loader-wordmark-text">Py<span>Runner</span></div>
  </div>
  <div class="loader-bar"><div class="loader-fill" id="loader-fill"></div></div>
  <div class="loader-text" id="loader-text">正在准备中...</div>
</div>

<!-- Main App -->
<div id="app">
  <header>
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M9.585 11.692H14.4v-3.23C14.4 5.1 12.55 3 9.585 3 6.87 3 5 4.92 5 7.462v1.015h3.23V7.4c0-.842.355-1.4 1.355-1.4s1.3.616 1.3 1.4v1.292H5v5.769c0 2.577 1.87 4.539 4.585 4.539H11v-2.308H9.585c-1 0-1.355-.615-1.355-1.461v-2h1.355zm5.1-3.692h2.73v2H14.685zm0 3.692v2h-2.73V11.7h2.73zm3.73-3.692v2h-1v3.692h1v2h-1c-2.73 0-4.415-1.962-4.415-4.539v-.385h1.685V9.97h-.73V7.97h4.46v.03z"/></svg>
      </div>
      <div class="logo-name">Py<span>Runner</span></div>
      <span class="logo-badge">3.12</span>
    </div>
    <div class="header-spacer"></div>
    <div class="header-actions">
      <!-- 导入文件按钮 -->
      <div class="icon-btn" id="import-btn" onclick="triggerImport()" title="导入 .py 文件">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      </div>
      <input type="file" id="file-input" accept=".py" style="display:none" onchange="importFile(event)">
      
      <div class="icon-btn" id="pwa-install-btn" onclick="installPWA()" title="安装到桌面" style="display:none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 16l-4-4h3V4h2v8h3l-4 4z"/><path d="M20 18H4v2h16v-2z"/></svg>
      </div>
      <div class="icon-btn" id="snippet-btn" title="代码片段">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 16.5h7M17.5 14v7"/></svg>
      </div>
      <div class="icon-btn" id="settings-btn" title="设置">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v2m0 16v2M4.22 4.22l1.42 1.42m12.72 12.72 1.42 1.42M2 12h2m16 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </div>
    </div>
  </header>

  <!-- Tab bar — 由 renderTabs() 动态渲染，不硬编码 -->
  <div id="tab-bar"></div>

  <!-- Main area -->
  <div id="main">
    <div id="editor-panel">
      <div id="code-wrap">
        <div id="line-numbers"></div>
        <div id="highlight-wrap">
          <pre id="highlight-pre" aria-hidden="true"><code id="highlight-code" class="language-python"></code></pre>
          <textarea id="editor" spellcheck="false" autocorrect="off" autocapitalize="off" autocomplete="off"></textarea>
        </div>
      </div>
      <!-- Resizer -->
      <div id="resizer"></div>
      <!-- Output panel -->
      <div id="output-panel">
        <div id="output-header">
          <span id="output-title">输出</span><span id="output-linecount" style="font-size:10px;color:var(--text3);margin-left:6px;font-weight:400;"></span>
          <div class="output-spacer"></div>
          <!-- 运行历史导航 -->
          <div id="history-nav">
            <button class="hist-btn" id="hist-prev" onclick="navHistory(-1)" title="上一次运行">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:10px;height:10px"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
            <span id="history-label">1/1</span>
            <button class="hist-btn" id="hist-next" onclick="navHistory(1)" title="下一次运行">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:10px;height:10px"><path d="M9 18l6-6-6-6"/></svg>
            </button>
          </div>
          <div class="output-action-btn" id="copy-output-btn" onclick="copyOutput()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px;margin-right:3px;vertical-align:-1px;display:inline-block"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>复制</div>
          <div class="output-action-btn" onclick="clearOutput()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px;margin-right:3px;vertical-align:-1px;display:inline-block"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>清空</div>
        </div>
        <div id="output-scroll">
          <div id="output-content">
            <div class="output-placeholder">
              <div class="output-placeholder-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg></div>
              <p>点击运行查看输出</p>
            </div>
          </div>
        </div>
        <!-- 变量检查器 -->
        <div id="vars-panel">
          <div id="vars-header" onclick="toggleVarsPanel()">
            <span id="vars-title">变量</span>
            <span id="vars-count"></span>
            <div class="output-action-btn" id="copy-vars-btn" onclick="copyVars(event)" style="display: none; margin-left: auto; margin-right: 6px;">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px;margin-right:3px;vertical-align:-1px;display:inline-block"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>复制
            </div>
            <svg id="vars-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
          </div>
          <div id="vars-scroll"><div id="vars-grid"></div></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toolbar -->
  <div id="toolbar">
    <button class="run-btn loading" id="run-btn" onclick="toggleRun()" title="运行 (Ctrl+Enter)">
      <svg id="run-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      <span id="run-label">运行</span>
    </button>
    <div class="toolbar-spacer"></div>
    <div class="toolbar-icon-btn" onclick="insertText('    ')" title="Tab 缩进">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </div>
    <div class="toolbar-icon-btn" onclick="insertText('()')" title="括号">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 4L4 12l4 8M16 4l4 8-4 8"/></svg>
    </div>
    <div class="toolbar-icon-btn" onclick="insertText('[]')" title="方括号">
      <span style="font-size:13px;font-weight:600;font-family:var(--mono)">[]</span>
    </div>
    <div class="toolbar-icon-btn" onclick="insertText(':')" title="冒号">
      <span style="font-size:15px;font-weight:600;font-family:var(--mono)">:</span>
    </div>
    <div class="toolbar-icon-btn" onclick="insertText('\"\"')" title="引号">
      <span style="font-size:13px;font-weight:600;font-family:var(--mono)">""</span>
    </div>
    <div class="toolbar-icon-btn" onclick="undoCode()" title="撤销">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10h10a5 5 0 010 10H9"/><path d="M3 10l4-4-4-4"/></svg>
    </div>
    <div class="format-btn-wrap">
      <div class="toolbar-icon-btn" id="format-btn" onclick="formatCode()" title="格式化代码 (autopep8)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10H7M21 6H3M21 14H7M21 18H3"/></svg>
      </div>
      <div id="format-status"></div>
    </div>
    <div class="toolbar-icon-btn" id="copy-code-btn" onclick="copyCode()" title="复制代码">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
    </div>
    <!-- 导出文件按钮 -->
    <div class="toolbar-icon-btn" onclick="downloadCode()" title="导出为 .py 文件">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
    </div>
    <div class="toolbar-icon-btn" id="clear-editor-btn" onclick="clearEditor()" title="清空编辑器">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
    </div>
    <div class="toolbar-divider"></div>
    <div class="status-pill loading" id="status">
      <div class="status-dot pulse"></div>
      <span id="status-text">加载中</span>
    </div>
  </div>
</div>

<!-- Snippets Drawer -->
<div id="snippets-overlay" class="sheet-overlay" onclick="closeSnippets(event)">
  <div id="snippets-drawer" class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <span class="sheet-title">代码片段</span>
      <div class="icon-btn" onclick="closeSnippets()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </div>
    </div>
    <div id="snippets-list"></div>
  </div>
</div>

<!-- Settings Drawer -->
<div id="settings-overlay" class="sheet-overlay" onclick="closeSettings(event)">
  <div id="settings-drawer" class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <span class="sheet-title">设置</span>
      <div class="icon-btn" onclick="closeSettings()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </div>
    </div>
    <div id="settings-body">
      <div class="setting-section-title">显示设置</div>
      <div class="setting-row">
        <div class="setting-label"><p>字体大小</p><span>代码区域字体</span></div>
        <select class="setting-select" id="font-size-select" onchange="applyFontSize(this.value)">
          <option value="11">11px</option>
          <option value="12">12px</option>
          <option value="13" selected>13px</option>
          <option value="14">14px</option>
          <option value="16">16px</option>
        </select>
      </div>
      <div class="setting-row">
        <div class="setting-label"><p>代码折行 (Word Wrap)</p><span>自动换行以适配屏幕</span></div>
        <div class="toggle" id="word-wrap-toggle" onclick="toggleSetting('word-wrap')"></div>
      </div>
      <div class="setting-row">
        <div class="setting-label"><p>显示行号</p><span>代码行号显示</span></div>
        <div class="toggle on" id="show-lines-toggle" onclick="toggleSetting('show-lines')"></div>
      </div>

      <div class="setting-section-title">运行设置</div>
      <div class="setting-row">
        <div class="setting-label"><p>自动缩进</p><span>按 Enter 自动对齐</span></div>
        <div class="toggle on" id="auto-indent-toggle" onclick="toggleSetting('auto-indent')"></div>
      </div>
      <div class="setting-row">
        <div class="setting-label"><p>清空上次输出</p><span>每次运行前清空</span></div>
        <div class="toggle on" id="clear-before-run-toggle" onclick="toggleSetting('clear-before-run')"></div>
      </div>

      <div class="setting-section-title">
        包管理器 (PyPI) 
        <span class="refresh-btn" onclick="refreshInstalledPkgs()">[刷新列表]</span>
      </div>
      <div class="setting-row" style="flex-direction:column; align-items:flex-start;">
        <div class="setting-label"><p>安装第三方库</p><span>输入包名从 PyPI 安装 (例如 requests)</span></div>
        <div class="pkg-input-group">
          <input type="text" id="pkg-input" class="pkg-input" placeholder="包名...">
          <button class="pkg-btn" id="pkg-install-btn" onclick="installPackageManual()">安装</button>
        </div>
        <div id="installed-pkgs-list">
          <!-- 这里动态渲染已安装的库标签 -->
          <span style="font-size:10px;color:var(--text3)">正在获取已安装列表...</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Input (stdin) overlay -->
<div id="stdin-overlay">
  <div id="stdin-box">
    <div id="stdin-label">Python input()</div>
    <div id="stdin-prompt"></div>
    <input id="stdin-input" type="text" placeholder="输入内容...">
    <button id="stdin-submit">确认</button>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script src="./js/app-core.js"></script>
<script src="./js/pwa.js"></script>
</body>
</html>
